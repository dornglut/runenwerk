when:
  - event: [push, pull_request]
    path:
      include:
        - Cargo.toml
        - Cargo.lock
        - "**/Cargo.toml"
        - "**/*.rs"
        - domain/ecs/README.md
        - domain/ecs/USAGE_GUIDE.md
        - domain/ecs/ARCHITECTURE.md
        - .woodpecker.yml

steps:
  verify:
    image: rust:1.88
    environment:
      CARGO_HOME: /woodpecker/.cargo
      RUST_LOG: info
    commands:
      - apt-get update
      - apt-get install -y pkg-config python3 libssl-dev libasound2-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev
      - cargo --version
      - python3 tools/docs/validate_docs.py
      - ./quiet_full_gate.sh
      - cargo test -p ecs --test docs_examples
      - cargo test -p ecs --doc
