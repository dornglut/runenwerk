[advisories]
version = 2
yanked = "warn"
ignore = [
  # Transitive through postcard 1.x/heapless 0.7; no safe direct upgrade in the
  # current dependency graph. Revisit when postcard can move to heapless 0.8+.
  "RUSTSEC-2023-0089",
  # Transitive through wgpu-hal/metal. This is an upstream graphics-stack
  # migration item, not a local runtime usage of paste.
  "RUSTSEC-2024-0436",
  # Direct engine text dependency. Track replacement with ab_glyph as a
  # dedicated rendering/text migration rather than masking it in code.
  "RUSTSEC-2021-0140",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[licenses.private]
ignore = true

[bans]
# Keep cargo-deny focused on hard dependency policy until duplicate-version and
# monorepo path-dependency baselines are curated. cargo-machete owns unused
# dependency enforcement in the current gate.
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
