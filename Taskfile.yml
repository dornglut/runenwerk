version: '3'

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list

  toolchain:bootstrap:
    desc: Install or update the Windows host toolchain for this repository.
    cmds:
      - powershell -ExecutionPolicy Bypass -File tools/bootstrap/bootstrap.ps1 {{.CLI_ARGS}}

  toolchain:doctor:
    desc: Check that required host tools are available.
    cmds:
      - powershell -ExecutionPolicy Bypass -File tools/bootstrap/bootstrap.ps1 -CheckOnly {{.CLI_ARGS}}

  roadmap:validate:
    desc: Validate structured roadmap YAML and generated JSON Schema.
    cmds:
      - uv run python tools/workflow/roadmap_state.py validate

  roadmap:render:
    desc: Render generated roadmap Markdown and PlantUML from YAML.
    cmds:
      - uv run python tools/workflow/generate_roadmap_docs.py render

  roadmap:check:
    desc: Check roadmap generated files and schemas are in sync.
    cmds:
      - uv run python tools/workflow/roadmap_state.py schema --check
      - uv run python tools/workflow/generate_roadmap_docs.py check

  production:validate:
    desc: Validate structured production tracks.
    cmds:
      - uv run python tools/workflow/production_state.py validate

  production:render:
    desc: Render generated production track Markdown and PlantUML from YAML.
    cmds:
      - uv run python tools/workflow/generate_production_docs.py render

  production:check:
    desc: Check production generated files and schema are in sync.
    cmds:
      - uv run python tools/workflow/production_state.py schema --check
      - uv run python tools/workflow/generate_production_docs.py check

  production:schema:
    desc: Render generated production track JSON Schema.
    cmds:
      - uv run python tools/workflow/production_state.py schema

  production:plan:
    desc: Print a production milestone to WR implementation-contract prompt and readiness report.
    cmds:
      - uv run python tools/workflow/production_plan.py plan {{.CLI_ARGS}}

  production:plan-track:
    desc: Create or audit a machine-readable Track Execution Manifest.
    cmds:
      - uv run python tools/workflow/production_track_cli.py plan-track {{.CLI_ARGS}}

  production:expand-track:
    desc: Print Track Expansion candidates without mutating WR rows.
    cmds:
      - uv run python tools/workflow/production_track_cli.py expand-track {{.CLI_ARGS}}

  production:complete-track-contracts:
    desc: Compile the Execution Contract Pack for a manifest-backed production track.
    cmds:
      - uv run python tools/workflow/production_track_cli.py complete-track-contracts {{.CLI_ARGS}}

  production:lock-track:
    desc: Create a digest-locked AI execution lock for a manifest-backed production track.
    cmds:
      - uv run python tools/workflow/production_track_cli.py lock-track {{.CLI_ARGS}}

  production:run-track:
    desc: Run one permission-gated manifest-backed production-track action.
    cmds:
      - uv run python tools/workflow/production_track_cli.py run-track {{.CLI_ARGS}}

  production:next:
    desc: Print one manifest-backed next legal production-track action.
    cmds:
      - uv run python tools/workflow/production_track_cli.py next {{.CLI_ARGS}}

  production:audit-track:
    desc: Audit a Track Execution Manifest against production and roadmap state.
    cmds:
      - uv run python tools/workflow/production_track_cli.py audit-track {{.CLI_ARGS}}

  execution:compile:
    desc: Compile a manifest-backed production track into an Execution Contract Pack.
    cmds:
      - uv run python tools/workflow/execution/cli.py compile {{.CLI_ARGS}}

  execution:preflight:
    desc: Preflight an Execution Contract Pack before locking or running.
    cmds:
      - uv run python tools/workflow/execution/cli.py preflight {{.CLI_ARGS}}

  execution:lock:
    desc: Create a digest lock for an Execution Contract Pack.
    cmds:
      - uv run python tools/workflow/execution/cli.py lock {{.CLI_ARGS}}

  execution:run:
    desc: Run the clean Track Execution Harness against a locked Contract Pack.
    cmds:
      - uv run python tools/workflow/execution/cli.py run {{.CLI_ARGS}}

  execution:next:
    desc: Print the next ActionContract from an Execution Contract Pack.
    cmds:
      - uv run python tools/workflow/execution/cli.py next {{.CLI_ARGS}}

  planning:validate:
    desc: Validate roadmap, production tracks, generated docs, and docs-site links.
    cmds:
      - task roadmap:validate
      - task roadmap:check
      - task production:validate
      - task production:check
      - task docs:validate

  roadmap:intake:
    desc: Create a roadmap intake proposal for a new design or change idea.
    cmds:
      - uv run python tools/workflow/roadmap_intake.py intake {{.CLI_ARGS}}

  roadmap:apply-intake:
    desc: Apply an approved roadmap intake proposal, then regenerate roadmap docs and PUML.
    cmds:
      - uv run python tools/workflow/roadmap_intake.py apply-intake {{.CLI_ARGS}}

  roadmap:promote:
    desc: Promote an existing roadmap item to a new planning state with evidence.
    cmds:
      - uv run python tools/workflow/roadmap_intake.py promote {{.CLI_ARGS}}

  roadmap:switch-current:
    desc: Demote one current candidate and promote another atomically with evidence.
    cmds:
      - uv run python tools/workflow/roadmap_intake.py switch-current {{.CLI_ARGS}}

  batch:propose:
    desc: Propose a parallel roadmap batch.
    cmds:
      - uv run python tools/workflow/parallel_batch.py propose {{.CLI_ARGS}}

  batch:kickoff:
    desc: Create a one-line next-roadmap batch proposal and print the generated workflow.
    cmds:
      - uv run python tools/workflow/parallel_batch.py kickoff {{.CLI_ARGS}}

  batch:continue:
    desc: Propose the next batch from finalized still-current roadmap items.
    cmds:
      - uv run python tools/workflow/parallel_batch.py continue {{.CLI_ARGS}}

  batch:approve:
    desc: Mark a batch manifest as approved.
    cmds:
      - uv run python tools/workflow/parallel_batch.py approve {{.CLI_ARGS}}

  batch:prepare:
    desc: Create worker prompts and git worktrees for an approved batch.
    cmds:
      - uv run python tools/workflow/parallel_batch.py prepare {{.CLI_ARGS}}

  batch:worker-prompt:
    desc: Print or write a generated worker prompt for one batch item.
    cmds:
      - uv run python tools/workflow/parallel_batch.py worker-prompt {{.CLI_ARGS}}

  batch:scope-check:
    desc: Validate worker changed files against approved write scopes.
    cmds:
      - uv run python tools/workflow/scope_enforcement.py check {{.CLI_ARGS}}

  batch:validate:
    desc: Run the official host-backed validation gate for an approved batch.
    cmds:
      - uv run python tools/workflow/parallel_batch.py validate {{.CLI_ARGS}}

  batch:refresh-base:
    desc: Refresh a not-started batch base before recreating worker worktrees.
    cmds:
      - uv run python tools/workflow/parallel_batch.py refresh-base {{.CLI_ARGS}}

  batch:closeout:
    desc: Check or write batch closeout report.
    cmds:
      - uv run python tools/workflow/parallel_batch.py closeout {{.CLI_ARGS}}

  batch:finalize:
    desc: Finalize an integrated batch, update closeout state, and clean worker worktrees.
    cmds:
      - uv run python tools/workflow/parallel_batch.py finalize {{.CLI_ARGS}}

  repo:hygiene:
    desc: Check local branch, worktree, and batch-manifest hygiene.
    cmds:
      - uv run python tools/workflow/repo_hygiene.py check {{.CLI_ARGS}}

  docs:validate:
    desc: Validate docs-site structure and links handled by repository docs validation.
    cmds:
      - uv run python tools/docs/validate_docs.py

  app:material-lab:
    desc: Run the standalone Material Lab app.
    cmds:
      - cargo run -p runenwerk_editor --bin runenwerk_material_lab

  ux:lab:test:
    desc: Run focused UX Lab Rust contract tests.
    cmds:
      - cargo test -p ui_widgets scenario
      - cargo test -p editor_shell ux_lab
      - cargo test -p runenwerk_editor editor_ux

  ux:lab:evidence:
    desc: Refresh PM-EDITOR-UX 002-007 UX Lab evidence manifests.
    cmds:
      - RUNENWERK_WRITE_PM_EDITOR_UX_002_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_002 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_003_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_003 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_004_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_004 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_005_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_005 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_006_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_006 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_007_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_007 -- --nocapture

  ux:lab:terminology:
    desc: Check UX Lab/scenario terminology in current code and planning docs.
    cmds:
      - uv run python tools/workflow/ux_lab_terminology.py

  puml:validate:
    desc: Validate every PlantUML diagram in the repository.
    cmds:
      - uv run python tools/workflow/roadmap_state.py puml

  python:test:
    desc: Run workflow Python tests.
    cmds:
      - uv run --group dev python -m pytest tools/workflow

  ai:list:
    desc: List AI prompt/checklist shapes.
    cmds:
      - uv run python tools/workflow/ai_task.py --list

  ai:architecture-governance:
    desc: Generate an architecture governance prompt/checklist.
    cmds:
      - uv run python tools/workflow/ai_task.py architecture-governance {{.CLI_ARGS}}

  ai:planning:
    desc: Generate a planning prompt/checklist.
    cmds:
      - uv run python tools/workflow/ai_task.py planning {{.CLI_ARGS}}

  ai:implementation:
    desc: Generate an implementation prompt/checklist.
    cmds:
      - uv run python tools/workflow/ai_task.py implementation {{.CLI_ARGS}}

  ai:parallel-roadmap-batch:
    desc: Generate a parallel roadmap batch prompt/checklist.
    cmds:
      - uv run python tools/workflow/ai_task.py parallel-roadmap-batch {{.CLI_ARGS}}

  ai:goal:
    desc: Generate a production-track Codex /goal coordinator prompt.
    cmds:
      - uv run python tools/workflow/production_goal.py goal {{.CLI_ARGS}}

  ai:closeout:
    desc: Generate a phase closeout prompt/checklist.
    cmds:
      - uv run python tools/workflow/ai_task.py phase-closeout {{.CLI_ARGS}}

  rust:test:
    desc: Run Rust tests with cargo-nextest.
    cmds:
      - cargo nextest run --test-threads 4

  rust:policy:
    desc: Run Rust dependency policy and unused dependency checks.
    cmds:
      - cargo deny check
      - cargo machete --skip-target-dir

  links:check:
    desc: Run external Markdown/link validation with lychee.
    cmds:
      - lychee docs-site/src/content/docs

  ast:scan:
    desc: Run structural source policy checks.
    cmds:
      - ast-grep scan

  ci:local:
    desc: Run the full local host validation pipeline.
    cmds:
      - task repo:hygiene
      - task roadmap:validate
      - task roadmap:check
      - task production:validate
      - task production:check
      - task puml:validate
      - task docs:validate
      - task python:test
      - task rust:test
      - task rust:policy
      - task links:check
      - task ast:scan
