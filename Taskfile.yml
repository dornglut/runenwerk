version: '3'

# Task is an optional convenience layer. Workflow authority and required validation
# live in docs-site/src/content/docs/workspace/engineering-workflow.md and
# `cargo validate`. Do not add project-management state machines here.

tasks:
  default:
    desc: List available optional helper tasks.
    cmds:
      - task --list

  validate:
    desc: Run the canonical required repository baseline.
    cmds:
      - cargo validate

  ci:local:
    desc: Deprecated compatibility alias for the canonical repository baseline.
    cmds:
      - cargo validate

  ci:extended:
    desc: Run the baseline plus optional deep validation tools.
    cmds:
      - cargo xtask validate --extended

  docs:validate:
    desc: Validate repository documentation only.
    cmds:
      - cargo xtask docs

  repo:audit:
    desc: Run the deterministic repository audit only.
    cmds:
      - cargo xtask audit

  toolchain:bootstrap:
    desc: Install or update the optional Windows host toolchain.
    cmds:
      - powershell -ExecutionPolicy Bypass -File tools/bootstrap/bootstrap.ps1 {{.CLI_ARGS}}

  toolchain:doctor:
    desc: Check that optional host tools are available.
    cmds:
      - powershell -ExecutionPolicy Bypass -File tools/bootstrap/bootstrap.ps1 -CheckOnly {{.CLI_ARGS}}

  roadmap:validate:
    desc: Validate the retained structured roadmap source.
    cmds:
      - uv run python tools/workflow/roadmap_state.py validate

  roadmap:render:
    desc: Render retained roadmap Markdown and PlantUML views.
    cmds:
      - uv run python tools/workflow/generate_roadmap_docs.py render

  roadmap:check:
    desc: Check retained roadmap generated views and schema.
    cmds:
      - uv run python tools/workflow/roadmap_state.py schema --check
      - uv run python tools/workflow/generate_roadmap_docs.py check

  production:validate:
    desc: Validate retained production-track planning data during migration.
    cmds:
      - uv run python tools/workflow/production_state.py validate

  production:render:
    desc: Render retained production-track planning views during migration.
    cmds:
      - uv run python tools/workflow/generate_production_docs.py render

  production:check:
    desc: Check retained production-track generated views during migration.
    cmds:
      - uv run python tools/workflow/production_state.py schema --check
      - uv run python tools/workflow/generate_production_docs.py check

  planning:validate:
    desc: Validate retained roadmap and production planning data plus documentation.
    cmds:
      - task roadmap:validate
      - task roadmap:check
      - task production:validate
      - task production:check
      - task docs:validate

  puml:validate:
    desc: Validate PlantUML diagrams through the retained roadmap helper.
    cmds:
      - uv run python tools/workflow/roadmap_state.py puml

  rust:test:
    desc: Run locked workspace tests without requiring cargo-nextest.
    cmds:
      - cargo test --workspace --locked

  rust:policy:
    desc: Run optional dependency policy and unused-dependency checks.
    cmds:
      - cargo deny check
      - cargo machete --skip-target-dir

  ui:dependencies:
    desc: Validate domain UI ownership and dependency boundaries.
    cmds:
      - python3 tools/checks/check_ui_layer_dependencies.py --root .

  links:check:
    desc: Run optional external Markdown link validation.
    cmds:
      - lychee docs-site/src/content/docs

  ast:scan:
    desc: Run optional structural source policy checks.
    cmds:
      - ast-grep scan

  app:material-lab:
    desc: Run the standalone Material Lab application.
    cmds:
      - cargo run -p runenwerk_editor --bin runenwerk_material_lab

  ux:lab:test:
    desc: Run focused UX Lab Rust contract tests.
    cmds:
      - cargo test -p ui_widgets scenario
      - cargo test -p editor_shell ux_lab
      - cargo test -p runenwerk_editor editor_ux

  ux:lab:evidence:
    desc: Refresh PM-EDITOR-UX 002-007 UX Lab evidence manifests.
    cmds:
      - RUNENWERK_WRITE_PM_EDITOR_UX_002_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_002 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_003_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_003 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_004_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_004 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_005_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_005 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_006_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_006 -- --nocapture
      - RUNENWERK_WRITE_PM_EDITOR_UX_007_EVIDENCE=1 cargo test -p runenwerk_editor pm_editor_ux_007 -- --nocapture

  ux:lab:terminology:
    desc: Check UX Lab and scenario terminology.
    cmds:
      - uv run python tools/workflow/ux_lab_terminology.py
