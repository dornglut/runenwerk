apiVersion: v1
kind: Secret
metadata:
  name: {{ include "multiplayer-stack.coreApiEnvSecretName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:%d/%s" .Values.postgres.username .Values.postgres.password (include "multiplayer-stack.postgresServiceName" .) (int .Values.postgres.port) .Values.postgres.database | quote }}
  REDIS_URL: {{ printf "redis://%s:%d" (include "multiplayer-stack.redisServiceName" .) (int .Values.redis.port) | quote }}
  RUST_LOG: {{ .Values.coreApi.rustLog | quote }}
  API_BIND_ADDR: {{ printf "0.0.0.0:%d" (int .Values.coreApi.containerPort) | quote }}
  PUBLIC_BASE_URL: {{ .Values.coreApi.publicBaseUrl | quote }}
  TRUST_PROXY_HEADERS: {{ ternary "true" "false" .Values.coreApi.trustProxyHeaders | quote }}
  DISCORD_CLIENT_ID: {{ .Values.coreApi.discordClientId | quote }}
  DISCORD_CLIENT_SECRET: {{ .Values.coreApi.discordClientSecret | quote }}
  DISCORD_REDIRECT_URI: {{ .Values.coreApi.discordRedirectUri | quote }}
  DEV_LOGIN_ENABLED: {{ ternary "true" "false" .Values.coreApi.devLoginEnabled | quote }}
  DEV_LOGIN_SHARED_SECRET: {{ .Values.coreApi.devLoginSharedSecret | quote }}
  JWT_ISSUER: {{ .Values.coreApi.jwtIssuer | quote }}
  JWT_AUDIENCE: {{ .Values.coreApi.jwtAudience | quote }}
  JWT_ACCESS_SECRET: {{ .Values.coreApi.jwtAccessSecret | quote }}
  REFRESH_TOKEN_HMAC_SECRET: {{ .Values.coreApi.refreshTokenHmacSecret | quote }}
  OPERATOR_AUTH_USERNAME: {{ .Values.coreApi.operatorAuthUsername | quote }}
  OPERATOR_AUTH_PASSWORD: {{ .Values.coreApi.operatorAuthPassword | quote }}
  OPERATOR_JWT_ISSUER: {{ .Values.coreApi.operatorJwtIssuer | quote }}
  OPERATOR_JWT_AUDIENCE: {{ .Values.coreApi.operatorJwtAudience | quote }}
  OPERATOR_JWT_SECRET: {{ .Values.coreApi.operatorJwtSecret | quote }}
  OPERATOR_BRIDGE_JWT_ISSUER: {{ .Values.coreApi.operatorBridgeJwtIssuer | quote }}
  OPERATOR_BRIDGE_JWT_AUDIENCE: {{ .Values.coreApi.operatorBridgeJwtAudience | quote }}
  OPERATOR_BRIDGE_JWT_SECRET: {{ .Values.coreApi.operatorBridgeJwtSecret | quote }}
  OPERATOR_TOKEN_TTL_SECONDS: {{ .Values.coreApi.operatorTokenTtlSeconds | quote }}
  OPERATOR_BRIDGE_TOKEN_TTL_SECONDS: {{ .Values.coreApi.operatorBridgeTokenTtlSeconds | quote }}
  SERVER_AUTH_MODE: {{ .Values.coreApi.serverAuthMode | quote }}
  DEDICATED_SERVER_ID_HEADER: {{ .Values.coreApi.dedicatedServerIdHeader | quote }}
  DEDICATED_SERVER_SHARED_SECRET: {{ .Values.coreApi.dedicatedServerSharedSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "multiplayer-stack.runtimeBridgeEnvSecretName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  CAVERN_AXIOM_OPERATOR_ENABLED: {{ .Values.bridge.runtime.enabled | quote }}
  CAVERN_AXIOM_OPERATOR_WS_URL: {{ .Values.bridge.runtime.wsUrl | quote }}
  CAVERN_AXIOM_OPERATOR_RUNTIME_TOKEN: {{ .Values.bridge.runtime.runtimeToken | quote }}
  CAVERN_AXIOM_OPERATOR_HEARTBEAT_SECONDS: {{ .Values.bridge.runtime.heartbeatSeconds | quote }}
  CAVERN_AXIOM_OPERATOR_SNAPSHOT_INTERVAL_TICKS: {{ .Values.bridge.runtime.snapshotIntervalTicks | quote }}
  CAVERN_AXIOM_OPERATOR_MAX_BUFFERED_EVENTS: {{ .Values.bridge.runtime.maxBufferedEvents | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "multiplayer-stack.fleetBridgeEnvSecretName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  GROTTO_FLEET_AXIOM_ENABLED: {{ .Values.bridge.fleet.enabled | quote }}
  GROTTO_FLEET_AXIOM_WS_URL: {{ .Values.bridge.fleet.wsUrl | quote }}
  GROTTO_FLEET_AXIOM_COMMAND_TOKEN: {{ .Values.bridge.fleet.commandToken | quote }}
  GROTTO_FLEET_AXIOM_SERVICE_ID: {{ .Values.bridge.fleet.serviceId | quote }}
  GROTTO_FLEET_AXIOM_HEARTBEAT_SECONDS: {{ .Values.bridge.fleet.heartbeatSeconds | quote }}
  GROTTO_FLEET_AXIOM_RECONNECT_BACKOFF_MS: {{ .Values.bridge.fleet.reconnectBackoffMs | quote }}
  GROTTO_FLEET_AXIOM_MAX_BUFFERED_EVENTS: {{ .Values.bridge.fleet.maxBufferedEvents | quote }}
