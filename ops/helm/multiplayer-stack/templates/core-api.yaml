apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multiplayer-stack.coreApiName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: core-api
spec:
  replicas: {{ .Values.coreApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "multiplayer-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: core-api
  template:
    metadata:
      labels:
        {{- include "multiplayer-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: core-api
    spec:
      containers:
        - name: core-api
          image: {{ printf "%s:%s" .Values.images.coreApi.repository .Values.images.coreApi.tag | quote }}
          imagePullPolicy: {{ .Values.images.coreApi.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "multiplayer-stack.coreApiEnvSecretName" . }}
          ports:
            - name: http
              containerPort: {{ .Values.coreApi.containerPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multiplayer-stack.coreApiServiceName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: core-api
spec:
  type: ClusterIP
  selector:
    {{- include "multiplayer-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: core-api
  ports:
    - name: http
      port: {{ .Values.coreApi.containerPort }}
      targetPort: http
