apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multiplayer-stack.operatorConsoleName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator-console
spec:
  replicas: {{ .Values.operatorConsole.replicaCount }}
  selector:
    matchLabels:
      {{- include "multiplayer-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator-console
  template:
    metadata:
      labels:
        {{- include "multiplayer-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator-console
    spec:
      containers:
        - name: operator-console
          image: {{ printf "%s:%s" .Values.images.operatorConsole.repository .Values.images.operatorConsole.tag | quote }}
          imagePullPolicy: {{ .Values.images.operatorConsole.pullPolicy }}
          env:
            - name: HOST
              value: {{ .Values.operatorConsole.host | quote }}
            - name: PORT
              value: {{ .Values.operatorConsole.port | quote }}
            - name: ORIGIN
              value: {{ .Values.operatorConsole.origin | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.operatorConsole.containerPort }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multiplayer-stack.operatorConsoleServiceName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator-console
spec:
  type: ClusterIP
  selector:
    {{- include "multiplayer-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: operator-console
  ports:
    - name: http
      port: {{ .Values.operatorConsole.containerPort }}
      targetPort: http
