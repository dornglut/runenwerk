apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "multiplayer-stack.fleetControlName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "multiplayer-stack.fleetControlName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "multiplayer-stack.fleetControlName" . }}
  labels:
    {{- include "multiplayer-stack.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "multiplayer-stack.fleetControlName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "multiplayer-stack.fleetControlName" . }}
