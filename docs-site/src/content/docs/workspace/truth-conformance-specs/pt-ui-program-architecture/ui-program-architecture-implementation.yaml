semantic_checks:
  - check_id: graph_family_lowering_to_runtime_tables
    description: UiProgram graph families lower into distinct runtime artifact table families.
    subject_paths:
      - domain/ui/ui_compiler/src/compiler.rs
      - domain/ui/ui_artifacts/src/tables/mod.rs
      - domain/ui/ui_artifacts/src/tables/control.rs
      - domain/ui/ui_artifacts/src/tables/layout.rs
      - domain/ui/ui_artifacts/src/tables/style.rs
      - domain/ui/ui_artifacts/src/tables/state.rs
      - domain/ui/ui_artifacts/src/tables/interaction.rs
      - domain/ui/ui_artifacts/src/tables/binding_snapshot.rs
      - domain/ui/ui_artifacts/src/tables/visual.rs
      - domain/ui/ui_artifacts/src/tables/text_layout.rs
    evidence_kinds: [runtime_test, artifact, source_maps]
    required_symbols: [UiCompiler, UiRuntimeArtifactTables, ControlTable, LayoutPlanTable, StyleResolutionTable, StateTable, InteractionDispatchTable, BindingSnapshotTable, CollectionDiffPlan, VisualOperatorTable, TextLayoutRequestTable, AccessibilityTable, InspectionTable]
    required_validation_fragments:
      - cargo test -p ui_compiler compiler_contract
      - cargo test -p ui_artifacts artifact_contract
  - check_id: graph_family_semantic_contracts
    description: All nine UiProgram graph families expose typed semantic contracts, source-map attachment, and owner-specific runtime data instead of generic node soup.
    subject_paths:
      - domain/ui/ui_program/src/graphs/control.rs
      - domain/ui/ui_program/src/graphs/layout.rs
      - domain/ui/ui_program/src/graphs/style.rs
      - domain/ui/ui_program/src/graphs/state.rs
      - domain/ui/ui_program/src/graphs/interaction.rs
      - domain/ui/ui_program/src/graphs/binding.rs
      - domain/ui/ui_program/src/graphs/visual.rs
      - domain/ui/ui_program/src/graphs/accessibility.rs
      - domain/ui/ui_program/src/graphs/inspection.rs
    evidence_kinds: [runtime_test, artifact, source_maps]
    required_symbols: [ControlGraph, LayoutGraph, StyleGraph, StateGraph, InteractionGraph, BindingGraph, VisualGraph, AccessibilityGraph, InspectionGraph]
    required_validation_fragments:
      - cargo test -p ui_program architecture_contract
      - cargo test -p ui_artifacts artifact_contract
  - check_id: control_package_design_truth
    description: ControlPackage owners provide schemas, state, route event payloads, kernels, accessibility, fixtures, diagnostics, migrations, and registry snapshots.
    subject_paths:
      - domain/ui/ui_controls/src/package.rs
      - domain/ui/ui_controls/src/registry.rs
      - domain/ui/ui_controls/src/color_picker/mod.rs
      - domain/ui/ui_controls/src/schema.rs
      - domain/ui/ui_controls/src/kernel.rs
      - domain/ui/ui_controls/src/diagnostics.rs
      - domain/ui/ui_controls/src/migration.rs
    evidence_kinds: [runtime_test, fixture, diagnostics, migration]
    required_symbols: [ControlPackageDescriptor, ControlPackageRegistry, ControlPackageRegistrySnapshot, ControlKindDescriptor, ControlFixtureId]
    required_validation_fragments:
      - cargo test -p ui_controls control_package
  - check_id: route_event_schema_payload_validation
    description: Route-based event packets use UI-owned schema values and capability contracts.
    subject_paths:
      - domain/ui/ui_program/src/events/packet.rs
      - domain/ui/ui_program/src/events/payload.rs
      - domain/ui/ui_program/src/events/route.rs
      - domain/ui/ui_schema/src/value.rs
    evidence_kinds: [runtime_test, diagnostics]
    required_symbols: [UiEventPacket, UiEventPayload, RouteCapability, UiSchemaValue]
    required_validation_fragments:
      - cargo test -p ui_program architecture_contract
  - check_id: source_map_and_diagnostics_preservation
    description: Compiler and runtime artifact outputs preserve source-map and diagnostics attachments.
    subject_paths:
      - domain/ui/ui_program/src/source_map.rs
      - domain/ui/ui_program/src/diagnostics.rs
      - domain/ui/ui_artifacts/src/source_map.rs
      - domain/ui/ui_artifacts/src/diagnostics.rs
    evidence_kinds: [source_maps, diagnostics]
    required_symbols: [UiProgramSourceMapEntry, UiProgramDiagnostic, CompiledSourceMap, UiRuntimeArtifactDiagnostic]
    required_validation_fragments:
      - cargo test -p ui_artifacts artifact_contract
  - check_id: evaluator_consumes_artifact_tables_and_state_binding
    description: Evaluator consumes runtime artifact tables and applies state/binding behavior deterministically.
    subject_paths:
      - domain/ui/ui_evaluator/src/evaluator.rs
      - domain/ui/ui_evaluator/src/passes.rs
      - domain/ui/ui_evaluator/src/state_binding.rs
      - domain/ui/ui_artifacts/src/tables/state.rs
      - domain/ui/ui_artifacts/src/tables/binding_snapshot.rs
    evidence_kinds: [runtime_test, artifact]
    required_symbols: [UiEvaluator, StateEvaluationPass, BindingEvaluationPass, apply_dirty_bindings_to_state]
    required_validation_fragments:
      - cargo test -p ui_evaluator evaluator_contract
  - check_id: retained_ui_compatibility_and_render_boundary
    description: Retained UI compatibility preserves draw-neutral render output and keeps product truth out of renderer ownership.
    subject_paths:
      - domain/ui/ui_evaluator/src/output.rs
      - domain/ui/ui_artifacts/src/artifact.rs
      - domain/ui/ui_compiler/src/compiler.rs
    evidence_kinds: [migration, visual, runtime_test]
    required_symbols: [UiOutput, UiRuntimeArtifact, UiCompiler]
    required_validation_fragments:
      - cargo test -p ui_testing architecture_fixtures
  - check_id: headless_fixture_reproducibility
    description: Headless fixtures prove reproducible diagnostics, source-map, and architecture readiness evidence.
    subject_paths:
      - domain/ui/ui_testing/src/headless_fixture.rs
      - domain/ui/ui_testing/src/architecture_fixture.rs
      - domain/ui/ui_testing/src/reproducibility.rs
      - domain/ui/ui_testing/src/assertions.rs
    evidence_kinds: [fixture, reproducibility, diagnostics, source_maps]
    required_symbols: [HeadlessFixture, UiArchitectureFixture, ReproducibilityAssertion, SourceMapAssertion]
    required_validation_fragments:
      - cargo test -p ui_testing architecture_fixtures
forbidden_code_terms:
  - foundation/meta
zero_gap_criteria:
  - no conformance findings
  - no known gaps
  - no known risks
  - no truth drift
  - all required owner modules exist
  - all required semantic symbols live in their owner modules
  - evidence names concrete implementation, validation, and artifact subjects
