    forbidden_patterns: ["pub struct ControlGraphNode", "pub struct LayoutGraphNode", "pub struct StateRequirement", "pub struct StyleRule", "pub struct InteractionHandler", "pub struct BindingEdge", "pub struct VisualOperator", "pub struct AccessibilityNode", "pub struct InspectionEntry"]
  - path: domain/ui/ui_artifacts/src/lib.rs
