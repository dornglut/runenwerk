version: 1
policy_id: runenwerk-run-ledger-retention-v1
successful_ledgers:
  current_authority: true
  retention: keep_current_authoritative_history
failed_ledgers:
  current_authority: false
  retention: diagnostic_history_only
  may_block_track_status_only_when:
  - action_id_matches_current_action
  - contract_pack_digest_matches_current_pack
  - source_digests_match_current_pack
stale_failed_ledgers:
  current_authority: false
  track_status_behavior: ignore_as_historical_diagnostic
test_ledgers:
  tracked_repo_paths_allowed: false
  required_location: temporary_or_ignored_workspace
closeout_rule:
  strong_truth_claims_require_current_successful_ledger_or_typed_validation_result: true
