version: 1
track_id: PT-UI-COMPONENT-PLATFORM
authority_level: planning_and_sequencing_only
accepted_design_dependencies:
- path: docs-site/src/content/docs/design/active/runenwerk-ui-platform-capability-roadmap.md
  required_status: active
  reason: The component platform track must follow the active split UI capability roadmap.
- path: docs-site/src/content/docs/design/active/runenwerk-ui-story-driven-golden-workflow-design.md
  required_status: active
  reason: Component proof must consume the story runner/report substrate instead of bypassing it.
- path: docs-site/src/content/docs/domain/ui/story-acceptance-and-review-checklist.md
  required_status: active
  reason: Reusable component maturity must be story-proven where story evidence is relevant.
global_forbidden_scope: &component_forbidden_scope
- no product code from this manifest alone
- no product code until an owning WR and accepted production plan exist
- no component milestone before PM-UI-STORY-004 story-gated rendering proof is available
- no story proof substrate ownership; route story contracts to PT-UI-STORY-PLATFORM
- no Visual UI Builder, Designer Workbench, or product authoring UX implementation; route to Designer/Workbench tracks
- no screen-space game HUD behavior; route to PT-GAME-RUNTIME-UI
- no world-space, entity-attached, projected attachment, or gameplay/world binding UI; route to PT-GAME-WORLDSPACE-UI
- no camera, projection, viewport, or surface-fit contract ownership; route to PT-VIEWPORT-PROJECTION
- no renderer-owned UI semantics
- no generated docs hand edits
global_validation_commands: &component_validation_commands
- task production:render
- task production:validate
- task production:check
- task roadmap:render
- task roadmap:validate
- task roadmap:check
- task docs:validate
- task planning:validate
global_stop_conditions:
- stop if manifest data conflicts with production track or roadmap state
- stop if a milestone lacks an owning WR or future WR candidate
- stop if generated docs would require hand edits
- stop before product code unless a dedicated active WR and accepted production plan authorize exact scope
- stop if story proof substrate work is implemented in PT-UI-COMPONENT-PLATFORM
- stop if editor builder/product authoring is implemented in PT-UI-COMPONENT-PLATFORM
- stop if game HUD behavior is implemented in PT-UI-COMPONENT-PLATFORM
- stop if world-space, entity-attached, projected attachment, or gameplay/world binding UI is implemented in PT-UI-COMPONENT-PLATFORM
next_legal_action: Create or link the future WR for PM-UI-COMPONENT-001 and keep execution planning-only until PM-UI-STORY-004 is available.
ai_executable: false
full_automation_target: false
truth_claims:
- claim_id: ui-component-platform-runtime-readiness
  claim_kind: product_behavior
  claim_level: runtime_proven
  claim_status: blocked
  claim_statement: The UI component platform may claim runtime_proven only after reusable component milestones close with story-derived evidence and bounded ownership.
  required_docs: []
  required_code_contracts: []
  required_validations: []
  required_closeout_evidence: []
  known_gaps:
  - PM-UI-COMPONENT-001 through PM-UI-COMPONENT-007 are not complete.
  - The component track depends on PM-UI-STORY-004 and must not start implementation before story-gated rendering proof exists.
  - Designer product workflows, screen HUD behavior, world-space/entity-attached UI, and viewport projection contracts are outside this track.
  supersedes:
  - component/platform milestones formerly nested inside PT-UI-STORY-PLATFORM
  blocks_downstream:
  - PM-UI-COMPONENT-002
  - PM-UI-COMPONENT-003
  - PM-UI-COMPONENT-004
  - PM-UI-COMPONENT-005
  - PM-UI-COMPONENT-006
  - PM-UI-COMPONENT-007
