version: 1
track_id: PT-TRACK-EXECUTION-HARNESS
authority_level: planning_and_sequencing_only
accepted_design_dependencies:
- path: docs-site/src/content/docs/workspace/track-execution-manifest.md
  required_status: active
  reason: Harness completion must follow the execution-manifest governance model.
- path: docs-site/src/content/docs/workspace/planning-and-implementation-workflow.md
  required_status: active
  reason: Public command behavior must stay aligned with the repository planning workflow.
- path: docs-site/src/content/docs/workspace/design-track-roadmap-governance.md
  required_status: active
  reason: Truth claims, closeouts, WR authority, and generated registers must not drift.
global_forbidden_scope:
- no UI product implementation
- no MaterialProgram implementation
- no crate creation
- no placeholder future folders
- no shared foundation/meta extraction
global_validation_commands:
- task production:render
- task production:validate
- task production:check
- task roadmap:render
- task roadmap:validate
- task roadmap:check
- task docs:validate
- task planning:validate
- task workflow:test
global_stop_conditions:
- stop if production, roadmap, manifest, Contract Pack, lock, plan sidecar, or evidence state conflict
- stop if a milestone lacks an owning WR or future WR candidate
- stop if validation fails
- stop before product-domain code, MaterialProgram, crate creation, placeholder folders, or foundation/meta extraction
next_legal_action: PM-TRACK-HARNESS-001 completed as bounded_contract; create or link the PM-TRACK-HARNESS-002 WR and accepted implementation plan before workflow implementation begins.
ai_executable: false
full_automation_target: false
truth_claims:
- claim_id: track-execution-harness-authority
  claim_kind: architecture_contract
  claim_level: architecture_runtime_proven
  claim_status: satisfied
  claim_statement: The clean Track Execution Harness is architecture-runtime-proven for locked manifest-backed track execution through source models, Contract Packs, locks, transactional executors, resolver-backed evidence, closeouts, agent-track, public command cutover, and legacy runner retirement.
  truth_verifier: track_execution_harness_authority
  truth_certificate_path: docs-site/src/content/docs/reports/truth-certificates/pt-track-execution-harness/track-execution-harness-authority.yaml
  required_docs:
  - evidence_kind: doc_frontmatter_status
    path: docs-site/src/content/docs/workspace/track-execution-manifest.md
    required_status: active
    reason: Harness behavior must be documented as current workflow truth.
  required_code_contracts:
  - evidence_kind: module_path_exists
    path: tools/workflow/track_sources
    reason: Source model authority must exist outside legacy execution.
  - evidence_kind: module_path_exists
    path: tools/workflow/execution
    reason: Execution kernel authority must exist outside legacy execution.
  - evidence_kind: module_path_exists
    path: tools/workflow/production_track_cli.py
    reason: Public production-track commands must route through the clean adapter.
  required_validations:
  - evidence_kind: validation_command
    command: task workflow:test
    reason: Workflow tests must pass before harness truth can be satisfied.
  - evidence_kind: validation_command
    command: task planning:validate
    reason: Roadmap, production, generated docs, and docs links must validate before closeout.
  required_closeout_evidence:
  - evidence_kind: closeout_evidence_category
    closeout_path: docs-site/src/content/docs/reports/closeouts/pm-track-harness-011-harness-runtime-proven-closeout/closeout.md
    category: handoff
    reason: Harness authority truth requires final architecture-runtime-proven handoff closeout evidence.
  known_gaps: []
  supersedes: []
  blocks_downstream: []
