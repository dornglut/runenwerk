    path: domain/ui/ui_artifacts/src/tables/text_layout.rs
    symbol: TextLayoutRequestTable
    reason: Future architecture proof must expose text layout request tables in their owner module.
  - evidence_kind: rust_symbol_exists
    path: domain/ui/ui_evaluator/src/evaluator.rs
    symbol: UiEvaluator
    reason: Future architecture proof must expose the evaluator contract.
