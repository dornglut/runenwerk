  - evidence_kind: doc_frontmatter_status
    path: docs-site/src/content/docs/reports/audits/pt-ui-program-architecture-truth-certification-correction.md
    required_status: completed
    reason: The overbroad historical completion claim must remain superseded until certification passes.
  required_code_contracts:
  - evidence_kind: module_path_exists
    path: domain/ui/ui_program
    reason: Future architecture proof must create or otherwise expose the domain-owned UiProgram owner boundary.
  - evidence_kind: rust_symbol_exists
    path: domain/ui/ui_program/src/program.rs
    symbol: UiProgram
    reason: Future architecture proof must expose the durable UiProgram contract.
  - evidence_kind: rust_symbol_exists
    path: domain/ui/ui_compiler/src/compiler.rs
    symbol: UiCompiler
    reason: Future architecture proof must expose the compiler contract.
  - evidence_kind: rust_symbol_exists
    path: domain/ui/ui_artifacts/src/manifest.rs
    symbol: UiRuntimeArtifactManifest
    reason: Future architecture proof must expose the durable runtime artifact manifest contract.
  - evidence_kind: rust_symbol_exists
    path: domain/ui/ui_artifacts/src/tables/mod.rs
    symbol: UiRuntimeArtifactTables
    reason: Future architecture proof must expose optimized runtime artifact tables as an aggregate facade.
  - evidence_kind: rust_symbol_exists
    path: domain/ui/ui_artifacts/src/tables/state.rs
    symbol: StateTable
    reason: Future architecture proof must expose state runtime tables in their owner module.
  - evidence_kind: rust_symbol_exists
    path: domain/ui/ui_artifacts/src/tables/binding_snapshot.rs
    symbol: BindingSnapshotTable
    reason: Future architecture proof must expose binding snapshot runtime tables in their owner module.
  - evidence_kind: rust_symbol_exists
