version: 1
track_id: PT-UI-PROGRAM-ARCHITECTURE
authority_level: planning_and_sequencing_only
accepted_design_dependencies:
  - path: docs-site/src/content/docs/design/active/runenwerk-domain-workbench-north-star.md
    required_status: active
    reason: The architecture implementation track must preserve the accepted Domain Workbench Platform north-star and extraction gates.
  - path: docs-site/src/content/docs/design/active/ui-program-architecture.md
    required_status: active
    reason: The architecture implementation track must follow the accepted UiProgram architecture target.
  - path: docs-site/src/content/docs/design/active/ui-program-contract-design.md
    required_status: active
    reason: The track must preserve the corrected proof-slice versus architecture-truth distinction.
  - path: docs-site/src/content/docs/reports/audits/pt-ui-program-architecture-current-truth-gap.md
    required_status: completed
    reason: The track must start from an explicit current-code truth audit.
global_forbidden_scope:
  - no product code from this manifest alone
  - no crate creation until PM-UI-PROGRAM-ARCH-002 and a later active WR explicitly authorize exact crate boundaries
  - no placeholder future folders
  - no MaterialProgram planning or implementation from this track before the MaterialProgram gate decision closes
  - no shared foundation/meta extraction
  - no renderer-owned UI product truth
  - no ECS-owned UI semantics
global_validation_commands:
  - task production:render
  - task production:validate
  - task production:check
  - task roadmap:render
  - task roadmap:validate
  - task roadmap:check
  - task docs:validate
  - task planning:validate
global_stop_conditions:
  - stop if manifest data conflicts with production track or roadmap state
  - stop if a milestone lacks an owning WR or future WR candidate
  - stop if validation fails
  - stop before product code unless a dedicated active WR and accepted production plan authorize exact scope
  - stop before crate creation unless the active WR and PM-UI-PROGRAM-ARCH-002 boundary decision authorize exact crates
  - stop before MaterialProgram planning or implementation while truth claims remain blocked
next_legal_action: Run task production:plan -- --milestone PM-UI-PROGRAM-ARCH-001 --roadmap WR-148; do not run product_code until the bounded plan is accepted.
ai_executable: false
full_automation_target: false
truth_claims:
  - claim_id: ui-program-architecture-implementation
    claim_kind: architecture_contract
    claim_level: architecture_runtime_proven
    claim_status: blocked
    claim_statement: Concrete UiProgram architecture implementation is not proven yet; this track exists to implement and validate the final architecture contracts.
    required_docs:
      - evidence_kind: doc_frontmatter_status
        path: docs-site/src/content/docs/design/active/ui-program-architecture.md
        required_status: active
        reason: Architecture implementation must remain aligned with the active architecture design.
      - evidence_kind: doc_frontmatter_status
        path: docs-site/src/content/docs/reports/audits/pt-ui-program-architecture-current-truth-gap.md
        required_status: completed
        reason: Current code truth must remain explicit until architecture implementation closes.
    required_code_contracts:
      - evidence_kind: module_path_exists
        path: domain/ui/ui_program
        reason: Future architecture proof must create or otherwise expose the domain-owned UiProgram owner boundary.
      - evidence_kind: rust_symbol_exists
        path: domain/ui/ui_program/src/lib.rs
        symbol: UiProgram
        reason: Future architecture proof must expose the durable UiProgram contract.
      - evidence_kind: rust_symbol_exists
        path: domain/ui/ui_compiler/src/lib.rs
        symbol: UiCompiler
        reason: Future architecture proof must expose the compiler contract.
      - evidence_kind: rust_symbol_exists
        path: domain/ui/ui_artifacts/src/lib.rs
        symbol: UiRuntimeArtifactManifest
        reason: Future architecture proof must expose the durable runtime artifact manifest contract.
      - evidence_kind: rust_symbol_exists
        path: domain/ui/ui_artifacts/src/lib.rs
        symbol: UiRuntimeArtifactTables
        reason: Future architecture proof must expose optimized runtime artifact tables.
      - evidence_kind: rust_symbol_exists
        path: domain/ui/ui_evaluator/src/lib.rs
        symbol: UiEvaluator
        reason: Future architecture proof must expose the evaluator contract.
    required_validations:
      - evidence_kind: validation_command
        command: cargo test -p ui_program architecture_contract
        reason: Future closeout must have executable UiProgram architecture validation.
      - evidence_kind: validation_command
        command: cargo test -p ui_compiler compiler_contract
        reason: Future closeout must have executable compiler validation.
      - evidence_kind: validation_command
        command: cargo test -p ui_evaluator evaluator_contract
        reason: Future closeout must have executable evaluator validation.
    required_closeout_evidence: []
    known_gaps:
      - Concrete UiProgram, graph-family, compiler, artifact, evaluator, host, diagnostics, source-map, fixture, migration, and retained-compatibility contracts are not implemented yet.
      - Current retained proof-slice evidence does not satisfy final architecture truth.
    supersedes: []
    blocks_downstream:
      - MaterialProgram proof planning
      - MaterialProgram implementation
      - foundation/meta extraction
  - claim_id: retained-ui-compatibility
    claim_kind: architecture_contract
    claim_level: architecture_runtime_proven
    claim_status: blocked
    claim_statement: Retained UI compatibility is not proven for the final UiProgram architecture until migration bridge evidence exists.
    required_docs: []
    required_code_contracts: []
    required_validations: []
    required_closeout_evidence: []
    known_gaps:
      - Current retained paths through ui_tree, ui_widgets, ui_runtime, ui_layout, and ui_math require explicit migration or compatibility evidence.
    supersedes: []
    blocks_downstream:
      - MaterialProgram proof planning
  - claim_id: materialprogram-readiness-gate
    claim_kind: handoff
    claim_level: architecture_runtime_proven
    claim_status: blocked
    claim_statement: MaterialProgram proof planning remains blocked until UiProgram architecture truth is satisfied or a later accepted ADR changes the gate.
    required_docs: []
    required_code_contracts: []
    required_validations: []
    required_closeout_evidence: []
    known_gaps:
      - PM-UI-PROGRAM-ARCH-010 is not complete.
      - UiProgram architecture truth is still blocked.
    supersedes: []
    blocks_downstream:
      - MaterialProgram proof planning
      - MaterialProgram implementation
  - claim_id: foundation-meta-extraction-gate
    claim_kind: extraction_gate
    claim_level: architecture_runtime_proven
    claim_status: blocked
    claim_statement: Shared foundation/meta extraction remains blocked until UI and MaterialProgram prove the same primitive and a separate extraction design accepts it.
    required_docs: []
    required_code_contracts: []
    required_validations: []
    required_closeout_evidence: []
    known_gaps:
      - MaterialProgram has not started and no second-domain primitive repetition is proven.
      - No accepted extraction design exists for shared program, graph, schema, capability, or artifact infrastructure.
    supersedes: []
    blocks_downstream:
      - foundation/meta extraction
