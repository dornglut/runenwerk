global_forbidden_scope:
- no product code from this manifest alone
- no product code until an owning WR and accepted production plan exist
- no crate creation until exact `domain/ui/ui_story` authority exists
- no renderer-owned UI semantics
- no ECS-owned UI semantics
- no editor-owned or game-owned UI product truth
- no mountable surface without story-derived mount eligibility
- no gallery migration until `UiStoryRunReport` is the gallery proof envelope
- no standalone static gallery rendering as a production growth path
- no reusable component maturity in the story platform
- no Visual UI Builder, Designer Workbench, or product authoring UX implementation in the story platform
- no screen-space game HUD behavior in the story platform
- no world-space, entity-attached, projected attachment, or gameplay/world binding UI in the story platform
- no generated docs hand edits
global_validation_commands:
- task production:render
- task production:validate
- task production:check
- task roadmap:render
- task roadmap:validate
- task roadmap:check
- task docs:validate
- task planning:validate
global_stop_conditions:
- stop if manifest data conflicts with production track or roadmap state
- stop if a milestone lacks an owning WR or future WR candidate
- stop if generated docs would require hand edits
- stop before product code unless a dedicated active WR and accepted production plan authorize exact scope
- stop before crate creation unless exact `domain/ui/ui_story` authority exists
- stop before runtime rendering proof until `UiStoryRunner` and `UiStoryRunReport` exist
- stop before static mount or product mount eligibility unless `UiStoryMountEligibility` is derived from `UiStoryRunReport`
- stop if component maturity is implemented in PT-UI-STORY-PLATFORM; route it to PT-UI-COMPONENT-PLATFORM
- stop if editor builder/product authoring is implemented in PT-UI-STORY-PLATFORM; route it to Designer/Workbench tracks
- stop if game HUD behavior is implemented in PT-UI-STORY-PLATFORM; route it to PT-GAME-RUNTIME-UI
- stop if world-space, entity-attached, projected attachment, or gameplay/world binding UI is implemented in PT-UI-STORY-PLATFORM; route it to PT-GAME-WORLDSPACE-UI
next_legal_action: Create or link the future WR for PM-UI-STORY-001 and keep execution planning-only; no runtime code, crate creation, gallery migration, product mount work, component maturity, designer product work, game HUD behavior, or world-space UI is authorized by this manifest.
