- stop before runtime rendering proof until `UiStoryRunner` and `UiStoryRunReport` exist
- stop before static mount or product mount eligibility unless `UiStoryMountEligibility` is derived from `UiStoryRunReport`
next_legal_action: Create or link the future WR for PM-UI-STORY-001 and keep execution planning-only; no runtime code, crate creation, gallery migration, or product mount work is authorized by this manifest.
