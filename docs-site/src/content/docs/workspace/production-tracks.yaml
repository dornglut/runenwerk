    - Game-runtime target profile covers screen HUD, safe areas, input/navigation policy, platform prompts, accessibility, performance/readability budgets, and unsupported-feature diagnostics.
    - ADR need is explicitly resolved before any new owner crate or source-truth authority change.
  - id: PM-GAME-RUNTIME-UI-003
    title: View-Model And Intent Contract Activation
    kind: implementation
    state: designing
    goal: Implement read-only game/runtime view-model packages and validated game UI intent proposals without UI-owned mutation.
    outcome: Game-runtime UI can display domain-owned state and emit validated intent proposals while the owning domain, app, or example remains responsible for mutation.
    dependencies:
    - PM-GAME-RUNTIME-UI-002
    roadmap_links: []
    design_gates:
    - kind: design
      path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
      required_status: accepted
      reason: View-model and intent activation must preserve the accepted game-runtime UI mutation boundary.
    - kind: design
      path: docs-site/src/content/docs/design/accepted/ui-designer-view-model-capability-and-intent-binding-design.md
      required_status: accepted
      reason: Game-runtime view-model and intent contracts must consume the accepted UI Designer binding doctrine.
    evidence_gates: []
    acceptance_criteria:
    - View-model packages are read-only snapshots or packets owned by the accepted game/runtime domain boundary.
    - UI intent output is validated, typed, source-mapped, and rejected fail-closed when capability, binding, or policy checks fail.
    - No UI definition, projection, or runtime frame mutates gameplay, render, scene, simulation, save-game, network, or project truth directly.
  - id: PM-GAME-RUNTIME-UI-004
    title: Generic Runtime UI Expression Submission
    kind: implementation
    state: designing
    goal: Evolve engine UI submission into deterministic producer registration and ordering for screen HUD, scene overlay, debug overlay, and later UI routes.
    outcome: Engine runtime owns generic UI expression submission while game HUD semantics stay with game-runtime UI owners and proof adapters.
    dependencies:
    - PM-GAME-RUNTIME-UI-003
    roadmap_links: []
    design_gates:
    - kind: design
      path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
      required_status: accepted
      reason: Engine UI submission must remain expression infrastructure and must not become game semantic authority.
    evidence_gates: []
    acceptance_criteria:
    - Runtime UI producers have typed registration, deterministic ordering, and diagnostics for conflicts, denied capabilities, stale data, and unsupported target routes.
    - Screen HUD, scene overlay, debug overlay, and later routes are ordered by policy rather than hardcoded special cases.
    - Engine runtime composes expressions but does not own game HUD vocabulary, gameplay view-models, or game intent mutation.
  - id: PM-GAME-RUNTIME-UI-005
    title: SDF Screen HUD Runtime Proof
    kind: implementation
    state: designing
    goal: Replace SDF window-title view controls with in-frame FPS/status and tab controls through runtime UI composition.
    outcome: The SDF render-flow example proves screen HUD rendering and validated tab intent behavior while SDF/example state remains the mutation owner.
    dependencies:
    - PM-GAME-RUNTIME-UI-004
    roadmap_links: []
    design_gates:
    - kind: design
      path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
      required_status: accepted
      reason: The SDF proof must follow the accepted screen HUD target and render-flow composition contract.
    evidence_gates: []
    acceptance_criteria:
    - FPS/status and tab controls render in-frame through scene output copied to surface.color followed by built-in UI composite.
    - WindowState title text no longer carries interactive SDF view-mode UI state.
    - UI tab selection emits a validated view-mode intent proposal, and SDF/example state applies accepted mutation.
    - The proof does not implement nameplates, damage numbers, boss frames, split-screen UI, or entity-attached/world-space UI.
  - id: PM-GAME-RUNTIME-UI-006
    title: Evidence Docs API Ergonomics And Hardening
    kind: hardening
    state: designing
    goal: Add replayable proof, diagnostics snapshots, accessibility and performance evidence where supported, usage docs, and focused examples.
    outcome: Game-runtime UI runtime behavior is inspectable, reproducible, documented, and honest about unsupported or deferred evidence.
    dependencies:
    - PM-GAME-RUNTIME-UI-005
    roadmap_links: []
    design_gates:
    - kind: design
      path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
      required_status: accepted
      reason: Evidence hardening must preserve the accepted runtime proof and ownership doctrine.
    evidence_gates: []
    acceptance_criteria:
    - Replayable proof artifacts cover success, invalid intent, missing view-model, denied capability, stale data, and unsupported target-profile scenarios.
    - Accessibility, performance, and visual evidence are recorded where the runtime supports them; unsupported checks are explicit typed gaps.
    - Public guides and examples teach the preferred game-runtime UI target, view-model, intent, and engine submission flow without internal shortcuts.
  - id: PM-GAME-RUNTIME-UI-007
    title: Runtime-Proven Closeout And Perfectionist Audit Intake
    kind: release
    state: designing
    goal: Close the track at runtime_proven only, list known gaps honestly, and create a separate no-gap/perfectionist audit intake before any perfectionist_verified claim.
    outcome: PT-GAME-RUNTIME-UI has runtime-proven closeout evidence and a separate perfectionist audit path for zero-gap certification.
