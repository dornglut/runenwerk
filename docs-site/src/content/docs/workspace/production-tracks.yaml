tracks:
  - id: PT-SDF-OW
    title: SDF-first open-world playable vertical
    state: active
    owner: workspace
    strategic_goal: Prove the SDF-first field-world architecture through a playable, visible, inspectable open world.
    success_criteria:
      - Player movement, world rendering, strict query products, diagnostics, and content products are integrated through production contracts.
      - Deferred world capabilities move through design gates before implementation, not through one-off prototype shortcuts.
      - The track remains extensible for caves, multiplayer, richer simulation, advanced VFX, and gameplay systems.
    milestones:
      - id: PM-SDF-OW-001
        title: Production product spine
        kind: implementation
        state: completed
        goal: Establish the product-backed editor and runtime spine needed before richer world capabilities are implemented.
        outcome: Field visualization, source-backed asset adapters, material preview products, and renderer handoff were planned and executed through WR roadmap rows.
        dependencies: []
        roadmap_links:
          - WR-019
          - WR-026
          - WR-021
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/sdf-first-production-capability-map.md
            required_status: accepted
            reason: Production planning must preserve the accepted SDF-first capability map.
          - kind: design
            path: docs-site/src/content/docs/design/active/field-visualizer-product-workflow-design.md
            required_status: active
            reason: Field visualization must remain a viewport product workflow.
          - kind: design
            path: docs-site/src/content/docs/design/active/editor-asset-pipeline-and-content-workflow-design.md
            required_status: active
            reason: Asset adapters must consume domain asset contracts instead of becoming semantic truth.
          - kind: design
            path: docs-site/src/content/docs/design/active/material-lab-and-material-preview-design.md
            required_status: active
            reason: Material preview work must keep material documents as source truth.
        evidence_gates:
          - path: docs-site/src/content/docs/reports/closeouts/wr-019-field-visualizer-product-workflow/closeout.md
            required_status: completed
            reason: PM-SDF-OW-001 requires completed field visualizer product workflow evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-026-source-backed-asset-editor-adapters/closeout.md
            required_status: completed
            reason: PM-SDF-OW-001 requires completed source-backed asset adapter evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-021-material-lab-and-material-preview-products/closeout.md
            required_status: completed
            reason: PM-SDF-OW-001 requires completed Material Lab and renderer handoff evidence.
        acceptance_criteria:
          - Product debug, asset catalog adapters, material preview products, and renderer handoff are validated through their WR closeouts.
          - No product workflow adds a parallel viewer, asset truth store, or renderer-owned semantic source.
        completion_quality: bounded_contract
        known_quality_gaps:
          - PM-SDF-OW-001 is completed as a bounded product-spine milestone; linked WR rows are not all perfectionist_verified.
          - WR-028 closes the visible Material Lab SDF primitive follow-up; WR-029 remains open for model/mesh material binding.
          - Model/mesh source identity, submesh/material-region assignment, prepared transport, shader lane, and pass provenance
            are accepted/code-backed through WR-029 Phase 1-3, but WR-030 still owns visible model/mesh pixel proof before
            WR-029 can close.
        completion_audit: ""
      - id: PM-SDF-OW-002
        title: Open world substrate design
        kind: design
        state: active
        goal: Promote the world-substrate design required for endless SDF terrain, material fields, collision queries, streaming, and diagnostics.
        outcome: Owning designs identify product formats, mutation paths, residency, strict query behavior, and diagnostics before implementation.
        dependencies:
          - PM-SDF-OW-001
        roadmap_links:
          - WR-001
          - WR-014
          - WR-015
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/sdf-first-field-world-platform-design.md
            required_status: accepted
            reason: World substrate work must follow the accepted SDF-first architecture.
          - kind: design
            path: docs-site/src/content/docs/design/deferred/sdf-world-production-slice-design.md
            required_status: accepted
            reason: The deferred production slice must be reworked into accepted implementation guidance before substrate implementation expands.
        evidence_gates: []
        acceptance_criteria:
          - Terrain, material, collision/query, render, diagnostics, and streaming ownership are accepted before execution.
          - The design preserves future caves, interiors, multiplayer authority, and world-process simulation.
      - id: PM-SDF-OW-003
        title: Playable SDF character
        kind: design
        state: designing
        goal: Define the production character contract for a controllable SDF player moving on strict world query products.
        outcome: Character body, pose, motion, collision, render, interaction emitters, and diagnostics have accepted ownership and product boundaries.
        dependencies:
          - PM-SDF-OW-002
        roadmap_links:
          - WR-014
          - WR-015
          - WR-022
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/sdf-procedural-animation-and-animated-models-design.md
            required_status: accepted
            reason: Player character implementation requires accepted animated spatial entity product ownership.
          - kind: design
            path: docs-site/src/content/docs/design/deferred/sdf-physics-collision-system-design.md
            required_status: accepted
            reason: Player movement must consume strict collision/query products.
        evidence_gates: []
        acceptance_criteria:
          - The player can walk, idle, and run using SDF-aware motion and strict query products.
          - Footstep, trample, wetness, and diagnostics hooks are explicit products or events, not renderer side effects.
      - id: PM-SDF-OW-004
        title: Atmosphere and material response
        kind: design
        state: designing
        goal: Define time, celestial, fog, exposure, material response, and diagnostic products for day/night production identity.
        outcome: Day/night becomes a world/render product family, not a renderer color shortcut.
        dependencies:
          - PM-SDF-OW-002
        roadmap_links:
          - WR-014
          - WR-015
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/deferred/day-night-atmosphere-system-design.md
            required_status: accepted
            reason: Day/night implementation requires accepted product and schedule ownership.
        evidence_gates: []
        acceptance_criteria:
          - Time, celestial, atmosphere, material response, and diagnostics products are accepted.
          - Future gameplay schedules and multiplayer authority remain possible.
      - id: PM-SDF-OW-005
        title: Vegetation field interaction
        kind: design
        state: designing
        goal: Define grass and reed products for density, wind, trample, recovery, LOD, water response, and diagnostics.
        outcome: Vegetation is planned as deterministic field products rather than per-blade authored state.
        dependencies:
          - PM-SDF-OW-003
          - PM-SDF-OW-004
        roadmap_links:
          - WR-014
          - WR-015
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/deferred/field-vegetation-system-design.md
            required_status: accepted
            reason: Vegetation implementation requires accepted field-product contracts.
        evidence_gates: []
        acceptance_criteria:
          - Grass responds to player motion and wind through products with visible diagnostics.
          - Near, mid, and far LOD behavior remains stable and inspectable.
      - id: PM-SDF-OW-006
        title: SDF prefab production set
        kind: design
        state: designing
        goal: Define source-backed SDF prefab production for trees, rocks, ruins, riverbanks, props, placement, collision, render, and diagnostics.
        outcome: Prefabs become reusable field compositions with product outputs rather than mesh-centric object bundles.
        dependencies:
          - PM-SDF-OW-002
        roadmap_links:
          - WR-022
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/sdf-prefab-composition-system-design.md
            required_status: accepted
            reason: Runtime prefab instancing requires accepted prefab product ownership.
        evidence_gates: []
        acceptance_criteria:
          - Trees, rocks, and ruins have source identity, placement rules, render products, collision/query products, and diagnostics.
          - Procedural placement and authored placement can share the same product contract.
      - id: PM-SDF-OW-007
        title: Water and wetness fields
        kind: design
        state: designing
        goal: Define rivers, lakes, flow, wetness, shoreline response, query products, and diagnostics without requiring full fluid simulation.
        outcome: Water is a field product family with explicit interaction and render handoff.
        dependencies:
          - PM-SDF-OW-004
          - PM-SDF-OW-006
        roadmap_links:
          - WR-014
          - WR-015
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/deferred/water-wetness-field-system-design.md
            required_status: accepted
            reason: Water implementation requires accepted wetness, flow, query, and render product contracts.
        evidence_gates: []
        acceptance_criteria:
          - Rivers, lakes, wet shorelines, simple query products, and diagnostics are accepted.
          - Future fluids and erosion remain compatible with the field-product model.
      - id: PM-SDF-OW-008
        title: Enemy and influence AI proof
        kind: design
        state: designing
        goal: Define SDF enemy, basic animation, threat/perception influence, and simple AI integration over field products.
        outcome: Enemy behavior uses explicit gameplay/influence contracts without requiring the full gameplay graph first.
        dependencies:
          - PM-SDF-OW-003
          - PM-SDF-OW-006
        roadmap_links:
          - WR-011
          - WR-014
          - WR-015
          - WR-022
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/deferred/field-influence-ai-system-design.md
            required_status: accepted
            reason: Enemy implementation requires accepted influence/perception query contracts.
          - kind: design
            path: docs-site/src/content/docs/design/active/gameplay-graph-atr-ir-and-ecs-lowering-design.md
            required_status: accepted
            reason: Any gameplay-graph integration must wait for accepted gameplay lowering contracts.
        evidence_gates: []
        acceptance_criteria:
          - Enemies emit and consume explicit influence/perception products.
          - Basic enemy behavior does not create hidden renderer or gameplay graph authority.
      - id: PM-SDF-OW-009
        title: Production hardening and playable evidence
        kind: hardening
        state: designing
        goal: Validate the integrated playable vertical through performance, residency, diagnostics, hot reload, and closeout evidence.
        outcome: The first production vertical is complete only when the combined acceptance criteria are observed and documented.
        dependencies:
          - PM-SDF-OW-005
          - PM-SDF-OW-007
          - PM-SDF-OW-008
        roadmap_links:
          - WR-018
          - WR-019
          - WR-021
          - WR-022
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/field-product-contracts-diagnostics-and-residency-design.md
            required_status: accepted
            reason: Hardening must use accepted diagnostics, residency, fallback, and freshness rules.
          - kind: design
            path: docs-site/src/content/docs/design/accepted/execution-fabric-and-product-jobs-design.md
            required_status: accepted
            reason: Integrated production execution must use accepted product-job and barrier rules.
        evidence_gates: []
        acceptance_criteria:
          - A player can move through an SDF field, observe day/night, affect vegetation, approach prefabs, see water/wetness, encounter enemies, and inspect diagnostics.
          - LOD, freshness, fallback, residency, and product-lineage diagnostics are stable enough for continued production.
  - id: PT-ECS-FABRIC
    title: ECS Execution Fabric Platform
    state: active
    owner: ecs
    strategic_goal: Make ECS, scheduler planning, and runtime product jobs deterministic, inspectable, ergonomic, and ready for future parallel execution without moving worker-thread ownership into domain crates.
    success_criteria:
      - ECS APIs make live state, systems, deferred commands, queries, messaging, snapshots, and runtime plans easy to inspect and use correctly.
      - Scheduler planning exposes deterministic phases, waves, barriers, conflicts, and diagnostics through non-panicking APIs suitable for tools and production debugging.
      - Runtime jobs remain the active multithreaded path, with serial fallback, stale suppression, panic capture, backpressure diagnostics, and barrier-based product/query publication.
      - Public ECS parallel execution is introduced only after accepted design, deterministic command merge, blocked-parallel diagnostics, and serial/parallel equivalence tests.
    milestones:
      - id: PM-ECS-FABRIC-001
        title: Audit and Product Baseline
        kind: design
        state: completed
        goal: Audit ECS, scheduler, multithreading, and runtime jobs against repository architecture and define the production sequence.
        outcome: The ECS execution-fabric audit identifies ownership, current implementation state, friction, gaps, future features, redesign candidates, and production-track sequencing.
        dependencies: []
        roadmap_links:
          - WR-002
          - WR-023
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/execution-fabric-and-product-jobs-design.md
            required_status: accepted
            reason: The ECS production track must preserve the accepted ECS/scheduler/runtime ownership split.
          - kind: design
            path: docs-site/src/content/docs/design/active/ecs-parallel-system-execution-design.md
            required_status: active
            reason: Parallel ECS work is intentionally design-first and must not be treated as accepted implementation policy yet.
        evidence_gates:
          - path: docs-site/src/content/docs/reports/audits/ecs-scheduler-job-system-audit-2026-05-21.md
            required_status: completed
            reason: PM-ECS-FABRIC-001 requires a completed code-grounded audit.
        acceptance_criteria:
          - ECS, scheduler, runtime jobs, product barriers, and multithreading ownership are mapped to exact modules and functions.
          - Friction, gaps, future features, ergonomics, architecture risks, redesign candidates, and refactors are recorded as production evidence.
          - The production track sequences WR-002 diagnostics/convergence work before WR-023 parallel execution implementation.
        completion_quality: bounded_contract
        known_quality_gaps:
          - The audit defines the production path but does not itself close runtime convergence, stale audit-doc drift, job-substrate hardening, or ECS parallel readiness gaps.
          - ECS parallel execution remains blocked on an accepted design/ADR and serial-equivalence evidence.
        completion_audit: docs-site/src/content/docs/reports/audits/ecs-scheduler-job-system-audit-2026-05-21.md
      - id: PM-ECS-FABRIC-002
        title: Runtime Convergence and Diagnostics
        kind: implementation
        state: active
        goal: Close the remaining ECS/runtime convergence and diagnostic gaps that directly support product jobs, snapshots, and production debugging.
        outcome: Runtime lifecycle finalization, plan inspection, conflict diagnostics, and docs evidence are current, non-panicking, and usable from tooling.
        dependencies:
          - PM-ECS-FABRIC-001
        roadmap_links:
          - WR-002
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/execution-fabric-and-product-jobs-design.md
            required_status: accepted
            reason: Runtime convergence must keep product jobs and barriers in engine runtime ownership.
          - kind: doc
            path: docs-site/src/content/docs/net/ecs-runtime-prioritized-roadmap.md
            required_status: active
            reason: WR-002 convergence scope is documented in the ECS runtime prioritized roadmap.
          - kind: doc
            path: docs-site/src/content/docs/reports/audits/ecs-scheduler-job-system-audit-2026-05-21.md
            required_status: completed
            reason: Implementation should work from the current code-grounded audit.
        evidence_gates: []
        acceptance_criteria:
          - "`domain/scheduler/src/plan.rs::ExecutionScheduler` exposes result-returning plan inspection APIs and ECS callers no longer rely on panic/hidden-error inspection for production tooling."
          - "`engine/src/runtime/frame_lifecycle.rs::run_runtime_frame` remains the canonical frame finalization path, with nested or overlay runtime finalization ownership explicitly documented or refactored."
          - Stale ECS runtime audit docs are refreshed or archived so roadmap and production planning reference current evidence.
          - ECS architecture docs accurately describe current system arity and named parameter diagnostics.
      - id: PM-ECS-FABRIC-003
        title: Runtime Product Job Substrate Hardening
        kind: implementation
        state: designing
        goal: Harden the runtime job executor and migrate suitable product-family workloads onto the accepted product-job substrate.
        outcome: Runtime product jobs are the obvious worker-backed path for product computation, with clear fallbacks and diagnostics.
        dependencies:
          - PM-ECS-FABRIC-002
        roadmap_links:
          - WR-001
          - WR-002
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/execution-fabric-and-product-jobs-design.md
            required_status: accepted
            reason: Product job hardening must keep worker execution and product publication in engine runtime ownership.
          - kind: doc
            path: docs-site/src/content/docs/engine/roadmaps/runtime-product-job-executor-roadmap.md
            required_status: active
            reason: Runtime job executor sequencing and deferred scope are documented in the engine roadmap.
        evidence_gates: []
        acceptance_criteria:
          - Runtime job executor construction reports worker-spawn failure or falls back to serial execution instead of panicking.
          - Product-job authoring helpers make common ECS-to-runtime-job workflows discoverable without moving worker-thread ownership into `domain/ecs`.
          - World build, import, and field product jobs migrate only when their product descriptors, generations, stale suppression, and barrier publication contracts are explicit.
      - id: PM-ECS-FABRIC-004
        title: Scheduler Plan Ergonomics
        kind: implementation
        state: designing
        goal: Improve scheduler plan APIs, access identity, frame-level inspection, and barrier policy without weakening deterministic serial behavior.
        outcome: Scheduler plans are easier to inspect, safer to compose, and ready for richer product/job scheduling diagnostics.
        dependencies:
          - PM-ECS-FABRIC-002
        roadmap_links:
          - WR-002
          - WR-023
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/execution-fabric-and-product-jobs-design.md
            required_status: accepted
            reason: Scheduler ergonomics must preserve deterministic barriers and product publication ownership.
          - kind: doc
            path: docs-site/src/content/docs/reports/audits/ecs-scheduler-job-system-audit-2026-05-21.md
            required_status: completed
            reason: Scheduler ergonomics should close the code-grounded audit findings.
        evidence_gates: []
        acceptance_criteria:
          - Scheduler plan inspection distinguishes rebuild errors from missing schedule labels.
          - Frame-level runtime inspection composes schedule phases, fixed-step loops, and publication barriers.
          - Barrier insertion can become policy-driven while the current safe per-wave default remains available.
          - Access keys can represent same-type distinct lanes when future queues, streams, or snapshots require it.
      - id: PM-ECS-FABRIC-005
        title: ECS Parallel Execution Readiness
        kind: design
        state: designing
        goal: Promote ECS parallel execution from active design to accepted implementation contract only after the safety model is complete.
        outcome: Parallel ECS has accepted ownership, API, safety, command-merge, diagnostics, fallback, and validation contracts before code changes make it public.
        dependencies:
          - PM-ECS-FABRIC-003
          - PM-ECS-FABRIC-004
        roadmap_links:
          - WR-023
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/ecs-parallel-system-execution-design.md
            required_status: accepted
            reason: Public parallel ECS execution requires an accepted design, not an active proposal.
          - kind: doc
            path: docs-site/src/content/docs/reports/audits/ecs-scheduler-job-system-audit-2026-05-21.md
            required_status: completed
            reason: Parallel readiness must address the current audit findings.
        evidence_gates: []
        acceptance_criteria:
          - The accepted design defines `Send + Sync` system parameter boundaries, resource access policy, per-wave command queues, deterministic merge ordering, and serial fallback.
          - Blocked-parallel diagnostics explain why a wave cannot run in parallel.
          - Serial/parallel equivalence tests are specified before implementation begins.
      - id: PM-ECS-FABRIC-006
        title: ECS Parallel Execution Implementation
        kind: implementation
        state: blocked
        goal: Implement parallel ECS waves only after the accepted readiness contract exists.
        outcome: ECS waves can run in parallel where safe, while serial execution remains permanent and behavior-equivalent.
        dependencies:
          - PM-ECS-FABRIC-005
        roadmap_links:
          - WR-023
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/ecs-parallel-system-execution-design.md
            required_status: accepted
            reason: Implementation is blocked until ECS parallel execution is accepted.
        evidence_gates: []
        acceptance_criteria:
          - Parallel waves use thread-safe system parameters and per-wave command queues.
          - Deferred command merge order is deterministic and covered by tests.
          - Serial and parallel runs are equivalent across conflict-heavy, deferred-command-heavy, product-barrier, and failure cases.
          - Runtime diagnostics identify parallelized, serialized, and blocked systems.
  - id: PT-WB-CAP
    title: Capability Workbench Platform
    state: active
    owner: editor
    strategic_goal: Replace legacy Workbench tool-surface compatibility with a registry-owned capability platform that can host the full editor, standalone Material Lab, constrained hosts, and headless validation through one typed composition model.
    success_criteria:
      - Workbench identity, profile construction, provider requests, and persistence use typed suite/profile/provider declarations and stable surface keys only.
      - Material Lab mounts in full-editor and standalone hosts without legacy tool-surface metadata.
      - Host command, product, and resource policy is enforced before provider proposals mutate app or domain state.
      - External dynamic components remain blocked until sandbox and security design is accepted.
    milestones:
      - id: PM-WB-CAP-001
        title: Clean Registry-Owned Workbench Foundation
        kind: implementation
        state: completed
        goal: Remove legacy tool-surface identity and replace it with typed suite, profile, provider, and registry-backed workspace composition.
        outcome: Workbench state, profiles, providers, persistence, and Material Lab routes are stable-key-only with no compatibility enum or V5 legacy fallback metadata.
        dependencies: []
        roadmap_links:
          - WR-031
          - WR-032
          - WR-033
          - WR-034
          - WR-035
          - WR-036
        design_gates:
          - kind: adr
            path: docs-site/src/content/docs/adr/accepted/0012-capability-workbench-clean-break.md
            required_status: accepted
            reason: The clean break intentionally drops legacy persisted workspace support.
          - kind: design
            path: docs-site/src/content/docs/design/active/editor-tool-suite-registry-and-workbench-host-design.md
            required_status: active
            reason: The registry-owned Workbench implementation must follow the active tool-suite host design.
        evidence_gates:
          - path: docs-site/src/content/docs/reports/closeouts/wr-031-workbench-clean-break-governance-and-adr/closeout.md
            required_status: completed
            reason: PM-WB-CAP-001 requires accepted clean-break governance and ADR evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-032-typed-suite-surface-profile-and-provider-handles/closeout.md
            required_status: completed
            reason: PM-WB-CAP-001 requires completed typed suite, surface, profile, and provider handle evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-033-remove-legacy-tool-surface-identity/closeout.md
            required_status: completed
            reason: PM-WB-CAP-001 requires completed legacy tool-surface identity removal evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-034-registry-backed-workspace-profiles/closeout.md
            required_status: completed
            reason: PM-WB-CAP-001 requires completed registry-backed workspace profile evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-035-clean-persistence-format/closeout.md
            required_status: completed
            reason: PM-WB-CAP-001 requires completed stable-key-only persistence evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-036-material-lab-clean-migration-proof/closeout.md
            required_status: completed
            reason: PM-WB-CAP-001 requires completed Material Lab full-editor and standalone host proof evidence.
        acceptance_criteria:
          - ToolSurfaceKind is removed from Workbench identity, profile construction, provider requests, persisted layout authority, and Material Lab routing.
          - Old persisted workspace schemas fail with a clear unsupported-schema diagnostic.
          - Full-editor and standalone Material Lab profiles mount from registry-backed composition data.
        completion_quality: bounded_contract
        known_quality_gaps:
          - PM-WB-CAP-001 completed the clean registry-owned Workbench foundation as a bounded milestone; linked WR rows are not all perfectionist_verified.
          - PM-WB-CAP-002 still owns host command, product, and resource capability policy.
          - PM-WB-CAP-003 still owns product and service capability declarations.
          - PM-WB-CAP-004 still owns broader full editor, standalone Material Lab, headless validation, and constrained host presets.
          - PM-WB-CAP-005 remains blocked and out of the non-deferred scope for external component sandbox readiness.
        completion_audit: ""
      - id: PM-WB-CAP-002
        title: Host Capability Policy
        kind: implementation
        state: completed
        goal: Add host allow/deny policy for command, product, and resource capabilities after the clean registry foundation exists.
        outcome: Provider proposals pass through host policy before app or domain mutation.
        dependencies:
          - PM-WB-CAP-001
        roadmap_links:
          - WR-037
        design_gates:
          - kind: adr
            path: docs-site/src/content/docs/adr/accepted/0012-capability-workbench-clean-break.md
            required_status: accepted
            reason: Host policy depends on registry-owned identity and stable declarations.
        evidence_gates:
          - path: docs-site/src/content/docs/reports/closeouts/wr-037-host-capability-policy/closeout.md
            required_status: completed
            reason: PM-WB-CAP-002 requires completed host capability policy evidence.
        acceptance_criteria:
          - Constrained hosts can deny command capabilities before app/domain mutation.
          - Product and resource capability keys are declared separately from provider UI routes.
        completion_quality: bounded_contract
        known_quality_gaps:
          - PM-WB-CAP-002 completed the provider proposal host policy gate as a bounded milestone; linked WR rows are not all perfectionist_verified.
          - PM-WB-CAP-003 still owns product and service capability declaration workflows.
          - PM-WB-CAP-004 still owns broader full-editor, standalone Material Lab, headless validation, and constrained host presets.
          - PM-WB-CAP-005 remains blocked and out of the non-deferred scope for external component sandbox readiness.
        completion_audit: ""
      - id: PM-WB-CAP-003
        title: Product And Service Capability Plane
        kind: design
        state: completed
        goal: Add product and service capability declarations without moving product semantics into editor_shell.
