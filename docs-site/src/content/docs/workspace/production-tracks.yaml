      required_status: completed
      reason: PM-TRACK-HARNESS-001 requires completed bounded-contract governance closeout evidence.
    acceptance_criteria:
    - PT-TRACK-EXECUTION-HARNESS exists with PM-001 through PM-011 sequencing.
    - A machine-readable Track Execution Manifest exists for the harness track.
    - Harness truth claims remain blocked until the clean kernel, evidence, agent-track, command cutover, and legacy retirement are proven.
