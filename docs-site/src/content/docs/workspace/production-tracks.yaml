  - id: PT-GAME-RUNTIME-UI
    title: Game Runtime UI Projection And HUD Platform
    state: active
    owner: workspace
    target_completion_quality: runtime_proven
    strategic_goal: Turn completed UI Designer contracts into a runtime-proven game UI projection and HUD platform with explicit ownership, fail-closed diagnostics, engine-owned UI expression submission, and SDF screen-HUD proof without moving gameplay or render truth into UI.
    success_criteria:
      - PT-UI-DESIGN remains completed design-contract input and is not reopened to justify runtime claims.
      - Game-runtime UI projection consumes shared Canonical UI IR and game-runtime target policy without depending on editor shell ownership.
      - UI definitions bind only to read-only game/runtime view-model packets and emit validated intent proposals.
      - Engine UI submission remains generic expression infrastructure; game HUD semantics stay with the accepted game-runtime UI owner or proof adapter.
      - SDF render-flow proof shows FPS/status and tab controls rendered in-frame through UI composition, not WindowState title text or debug overlay reuse.
      - Runtime-proven closeout lists known gaps truthfully and creates a separate perfectionist-audit intake before any no-gap claim.
    milestones:
      - id: PM-GAME-RUNTIME-UI-001
        title: Governance Owner Boundary And Code Truth Matrix
        kind: design
        state: designing
        goal: Establish the governance contract, active design, owner-boundary decision path, code-truth matrix, evidence matrix, hard blockers, and disjoint follow-on WR candidates before game UI implementation.
        outcome: The game-runtime UI track has an active design, roadmap intake row, architecture-governance findings, production metadata, and follow-on implementation slices without changing app, domain, engine, renderer, or SDF runtime code.
        dependencies:
          - PM-UI-DESIGN-010
        roadmap_links:
          - WR-104
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
            required_status: active
            reason: Governance must be anchored by the active game-runtime UI projection and HUD platform design.
        evidence_gates: []
        acceptance_criteria:
          - Architecture governance names DDD owner candidates, dependency direction, translation boundaries, ADR need, fitness functions, and ownership mode.
          - Current SDF, engine UI submission, debug metrics, UI runtime, and UI definition code reality is reconciled against accepted UI Designer contracts.
          - Follow-on WR candidates have disjoint write scopes, dependency order, validation gates, runtime evidence requirements, and stop conditions.
          - No product implementation starts until a follow-on WR has accepted roadmap evidence and a production implementation contract.
        completion_quality: not_applicable
        known_quality_gaps:
          - PM-GAME-RUNTIME-UI-002 through PM-GAME-RUNTIME-UI-007 remain unimplemented and must not be inferred complete from governance setup.
          - No game-runtime UI owner crate, target extension implementation, engine UI producer registry, SDF HUD runtime proof, or evidence hardening is implemented in this milestone.
        completion_audit: ''
      - id: PM-GAME-RUNTIME-UI-002
        title: Game Runtime Target Extension Contract
        kind: design
        state: designing
        goal: Decide the accepted owner boundary for game-runtime UI target extensions, HUD vocabulary, safe-area and input policy, projection diagnostics, and ADR need.
        outcome: Game-runtime UI target extensions have an accepted ownership and projection contract before code introduces a new owner crate or runtime behavior.
        dependencies:
          - PM-GAME-RUNTIME-UI-001
        roadmap_links: []
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
            required_status: accepted
            reason: Target extension implementation must follow an accepted game-runtime UI owner-boundary design.
        evidence_gates: []
        acceptance_criteria:
          - Owner boundary for future game-runtime UI target extensions is accepted before any new crate or module owns game UI semantics.
          - Game-runtime target profile covers screen HUD, safe areas, input/navigation policy, platform prompts, accessibility, performance/readability budgets, and unsupported-feature diagnostics.
          - ADR need is explicitly resolved before any new owner crate or source-truth authority change.
      - id: PM-GAME-RUNTIME-UI-003
        title: View-Model And Intent Contract Activation
        kind: implementation
        state: designing
        goal: Implement read-only game/runtime view-model packages and validated game UI intent proposals without UI-owned mutation.
        outcome: Game-runtime UI can display domain-owned state and emit validated intent proposals while the owning domain, app, or example remains responsible for mutation.
        dependencies:
          - PM-GAME-RUNTIME-UI-002
        roadmap_links: []
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
            required_status: accepted
            reason: View-model and intent activation must preserve the accepted game-runtime UI mutation boundary.
          - kind: design
            path: docs-site/src/content/docs/design/accepted/ui-designer-view-model-capability-and-intent-binding-design.md
            required_status: accepted
            reason: Game-runtime view-model and intent contracts must consume the accepted UI Designer binding doctrine.
        evidence_gates: []
        acceptance_criteria:
          - View-model packages are read-only snapshots or packets owned by the accepted game/runtime domain boundary.
          - UI intent output is validated, typed, source-mapped, and rejected fail-closed when capability, binding, or policy checks fail.
          - No UI definition, projection, or runtime frame mutates gameplay, render, scene, simulation, save-game, network, or project truth directly.
      - id: PM-GAME-RUNTIME-UI-004
        title: Generic Runtime UI Expression Submission
        kind: implementation
        state: designing
        goal: Evolve engine UI submission into deterministic producer registration and ordering for screen HUD, scene overlay, debug overlay, and later UI routes.
        outcome: Engine runtime owns generic UI expression submission while game HUD semantics stay with game-runtime UI owners and proof adapters.
        dependencies:
          - PM-GAME-RUNTIME-UI-003
        roadmap_links: []
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
            required_status: accepted
            reason: Engine UI submission must remain expression infrastructure and must not become game semantic authority.
        evidence_gates: []
        acceptance_criteria:
          - Runtime UI producers have typed registration, deterministic ordering, and diagnostics for conflicts, denied capabilities, stale data, and unsupported target routes.
          - Screen HUD, scene overlay, debug overlay, and later routes are ordered by policy rather than hardcoded special cases.
          - Engine runtime composes expressions but does not own game HUD vocabulary, gameplay view-models, or game intent mutation.
      - id: PM-GAME-RUNTIME-UI-005
        title: SDF Screen HUD Runtime Proof
        kind: implementation
        state: designing
        goal: Replace SDF window-title view controls with in-frame FPS/status and tab controls through runtime UI composition.
        outcome: The SDF render-flow example proves screen HUD rendering and validated tab intent behavior while SDF/example state remains the mutation owner.
