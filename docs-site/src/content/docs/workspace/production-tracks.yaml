            required_status: active
            reason: External readiness must follow the capability Workbench target architecture.
        evidence_gates: []
        acceptance_criteria:
          - No external dynamic component implementation lands before sandbox/security acceptance.
          - The design names trust boundaries, permissions, process/ABI options, diagnostics, and rollback behavior.
  - id: PT-RENDER-PG
    title: Render Product Graph Platform
    state: active
    owner: engine
    strategic_goal: Make rendering a product-driven, inspectable, graph-compiled platform without moving product truth into the renderer.
    success_criteria:
      - Domains and Product Jobs own product truth, lineage, freshness, authority class, fallback legality, rebuild policy, residency intent, and diagnostics.
      - The Render Execution Graph Compiler consumes prepared render product selections and feature-owned render fragments only.
      - "The backend runtime owns derived GPU execution state only: WGPU allocation, command encoding, pipelines, bind groups, uploads, captures, timing, and presentation."
      - Product surfaces, render fragments, diagnostics, multi-surface presentation, and future product families share one contract path without renderer-owned semantic shortcuts.
    milestones:
      - id: PM-RENDER-PG-001
        title: Render Product Graph Doctrine And Boundary Ratification
        kind: design
        state: active
        goal: Ratify the product-first renderer doctrine and separate Product Graph/Product Jobs from render execution graph compilation before implementation work expands.
        outcome: The active design, roadmap mapping, and render docs define a product-first render platform without changing WR execution legality.
        dependencies: []
        roadmap_links:
          - WR-003
          - WR-009
          - WR-010
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/render-product-graph-platform-design.md
            required_status: active
            reason: The doctrine slice requires an active canonical design before it can guide production sequencing.
        evidence_gates: []
        acceptance_criteria:
          - The active canonical design exists and clearly separates Product Graph/Product Jobs from the Render Execution Graph Compiler.
          - Stale render docs no longer describe implemented product-surface, prepared-view, dynamic-target, target-alias, or product-view behavior as deferred.
          - Fully Featured Renderer Roadmap maps FR-0 through FR-8 to PM-RENDER-PG milestones or explicitly deferred product-family designs.
          - Production, roadmap, docs, and planning validators pass without promoting WR execution state.
      - id: PM-RENDER-PG-002
        title: Render Contract Ergonomics
        kind: implementation
        state: designing
        goal: Make product-surface and render-flow authoring easier to use without exposing renderer-private shortcuts.
        outcome: Product-surface and render-flow authoring have focused examples, diagnostics, and contract tests.
        dependencies:
          - PM-RENDER-PG-001
        roadmap_links:
          - WR-003
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/render-product-graph-platform-design.md
            required_status: accepted
            reason: Ergonomics work must follow the accepted product/render execution boundary.
        evidence_gates: []
        acceptance_criteria:
          - Common product-surface authoring paths are documented with focused examples.
          - Diagnostics make target alias, dynamic target, history, and product-surface request failures visible.
          - App code does not need renderer-private handles, cloned flows, or suffixed static labels to produce dynamic products.
      - id: PM-RENDER-PG-003
        title: Feature-Owned Render Contributions
        kind: implementation
        state: designing
        goal: Replace central feature contribution growth with typed feature-owned collectors and render-fragment contracts.
        outcome: Feature-owned collectors are typed, inspectable, capability-declared, diagnostic-producing, and validated before submit.
        dependencies:
          - PM-RENDER-PG-002
        roadmap_links:
          - WR-003
          - WR-010
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/render-product-graph-platform-design.md
            required_status: accepted
            reason: Contribution migration must preserve the accepted feature-owned typed contract.
        evidence_gates: []
        acceptance_criteria:
          - New render features can register contribution collectors without adding new central payload variants.
          - Contributions are not unstructured type-erased blobs and remain inspectable through prepared-frame diagnostics.
          - Submit receives validated prepared contributions and performs no live ECS extraction.
      - id: PM-RENDER-PG-004
        title: Render Execution Graph Compiler Maturity
        kind: implementation
        state: designing
        goal: Mature render execution graph compilation over prepared selections and feature fragments without deciding product truth.
        outcome: The compiler validates render resources, pass order, target aliases, history scope, resource lifetimes, and backend capability constraints.
        dependencies:
          - PM-RENDER-PG-003
        roadmap_links:
          - WR-003
          - WR-010
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/render-product-graph-platform-design.md
            required_status: accepted
            reason: Compiler maturity must follow the accepted Product Graph versus Render Execution Graph boundary.
        evidence_gates: []
        acceptance_criteria:
          - Compiler diagnostics reject invalid render resources, pass order, target aliases, history scopes, resource lifetimes, and backend capability mismatches.
          - Compiler inputs are prepared render selections and feature-owned render fragments only.
          - Product freshness, authority, fallback legality, rebuild policy, and product dependency truth remain outside the compiler.
      - id: PM-RENDER-PG-005
        title: Product Surface Platform Hardening
        kind: implementation
        state: designing
        goal: Harden the shared product-surface path for viewport, material preview, field/debug, drawing, and future preview products.
        outcome: Product-surface producers share the same dynamic target, prepared view, invocation, history, UI sampling, and diagnostic contracts.
        dependencies:
          - PM-RENDER-PG-002
          - PM-RENDER-PG-004
        roadmap_links:
          - WR-003
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/render-product-graph-platform-design.md
            required_status: accepted
            reason: Product-surface hardening must preserve product-first ownership and renderer-derived execution.
        evidence_gates: []
        acceptance_criteria:
          - Viewport, material preview, field/debug, drawing/product previews, and diagnostics use the shared product-surface path.
