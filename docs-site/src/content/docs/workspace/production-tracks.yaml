      - id: PM-WB-CAP-004
        title: Multi-Host Workbench Modes
        kind: implementation
        state: completed
        goal: Define full editor, standalone Material Lab, headless validation, and constrained host presets from the same clean Workbench model.
        outcome: Hosts differ by suite/profile/provider bundle and policy, not by forked app-specific compatibility paths.
        dependencies:
          - PM-WB-CAP-001
          - PM-WB-CAP-002
        roadmap_links:
          - WR-039
        design_gates:
          - kind: adr
            path: docs-site/src/content/docs/adr/accepted/0012-capability-workbench-clean-break.md
            required_status: accepted
            reason: Multi-host modes must not restore legacy surface-kind identity.
        evidence_gates:
          - path: docs-site/src/content/docs/reports/closeouts/wr-039-multi-host-presets/closeout.md
            required_status: completed
            reason: PM-WB-CAP-004 requires completed multi-host preset evidence.
        acceptance_criteria:
          - Full editor and Material Lab host presets are built from the same composition builder.
