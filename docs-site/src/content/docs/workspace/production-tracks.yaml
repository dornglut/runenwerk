tracks:
  - id: PT-SDF-OW
    title: SDF-first open-world playable vertical
    state: active
    owner: workspace
    strategic_goal: Prove the SDF-first field-world architecture through a playable, visible, inspectable open world.
    success_criteria:
      - Player movement, world rendering, strict query products, diagnostics, and content products are integrated through production contracts.
      - Deferred world capabilities move through design gates before implementation, not through one-off prototype shortcuts.
      - The track remains extensible for caves, multiplayer, richer simulation, advanced VFX, and gameplay systems.
    milestones:
      - id: PM-SDF-OW-001
        title: Production product spine
        kind: implementation
        state: completed
        goal: Establish the product-backed editor and runtime spine needed before richer world capabilities are implemented.
        outcome: Field visualization, source-backed asset adapters, material preview products, and renderer handoff were planned and executed through WR roadmap rows.
        dependencies: []
        roadmap_links:
          - WR-019
          - WR-026
          - WR-021
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/sdf-first-production-capability-map.md
            required_status: accepted
            reason: Production planning must preserve the accepted SDF-first capability map.
          - kind: design
            path: docs-site/src/content/docs/design/active/field-visualizer-product-workflow-design.md
            required_status: active
            reason: Field visualization must remain a viewport product workflow.
          - kind: design
            path: docs-site/src/content/docs/design/active/editor-asset-pipeline-and-content-workflow-design.md
            required_status: active
            reason: Asset adapters must consume domain asset contracts instead of becoming semantic truth.
          - kind: design
            path: docs-site/src/content/docs/design/active/material-lab-and-material-preview-design.md
            required_status: active
            reason: Material preview work must keep material documents as source truth.
        evidence_gates:
          - path: docs-site/src/content/docs/reports/closeouts/wr-019-field-visualizer-product-workflow/closeout.md
            required_status: completed
            reason: PM-SDF-OW-001 requires completed field visualizer product workflow evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-026-source-backed-asset-editor-adapters/closeout.md
            required_status: completed
            reason: PM-SDF-OW-001 requires completed source-backed asset adapter evidence.
          - path: docs-site/src/content/docs/reports/closeouts/wr-021-material-lab-and-material-preview-products/closeout.md
            required_status: completed
            reason: PM-SDF-OW-001 requires completed Material Lab and renderer handoff evidence.
        acceptance_criteria:
          - Product debug, asset catalog adapters, material preview products, and renderer handoff are validated through their WR closeouts.
          - No product workflow adds a parallel viewer, asset truth store, or renderer-owned semantic source.
        completion_quality: bounded_contract
        known_quality_gaps:
          - PM-SDF-OW-001 is completed as a bounded product-spine milestone; linked WR rows are not all perfectionist_verified.
          - WR-028 closes the visible Material Lab SDF primitive follow-up; WR-029 remains open for model/mesh material binding.
          - Model/mesh source identity, submesh/material-region assignment, prepared transport, shader lane, and pass provenance
            are accepted/code-backed through WR-029 Phase 1-3, but WR-030 still owns visible model/mesh pixel proof before
            WR-029 can close.
        completion_audit: ""
      - id: PM-SDF-OW-002
        title: Open world substrate design
        kind: design
        state: active
        goal: Promote the world-substrate design required for endless SDF terrain, material fields, collision queries, streaming, and diagnostics.
        outcome: Owning designs identify product formats, mutation paths, residency, strict query behavior, and diagnostics before implementation.
        dependencies:
          - PM-SDF-OW-001
        roadmap_links:
          - WR-001
          - WR-014
          - WR-015
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/accepted/sdf-first-field-world-platform-design.md
            required_status: accepted
            reason: World substrate work must follow the accepted SDF-first architecture.
          - kind: design
            path: docs-site/src/content/docs/design/deferred/sdf-world-production-slice-design.md
            required_status: accepted
            reason: The deferred production slice must be reworked into accepted implementation guidance before substrate implementation expands.
        evidence_gates: []
        acceptance_criteria:
          - Terrain, material, collision/query, render, diagnostics, and streaming ownership are accepted before execution.
          - The design preserves future caves, interiors, multiplayer authority, and world-process simulation.
      - id: PM-SDF-OW-003
        title: Playable SDF character
        kind: design
        state: designing
        goal: Define the production character contract for a controllable SDF player moving on strict world query products.
        outcome: Character body, pose, motion, collision, render, interaction emitters, and diagnostics have accepted ownership and product boundaries.
        dependencies:
          - PM-SDF-OW-002
        roadmap_links:
          - WR-014
          - WR-015
          - WR-022
        design_gates:
          - kind: design
            path: docs-site/src/content/docs/design/active/sdf-procedural-animation-and-animated-models-design.md
            required_status: accepted
            reason: Player character implementation requires accepted animated spatial entity product ownership.
          - kind: design
            path: docs-site/src/content/docs/design/deferred/sdf-physics-collision-system-design.md
            required_status: accepted
            reason: Player movement must consume strict collision/query products.
        evidence_gates: []
        acceptance_criteria:
          - The player can walk, idle, and run using SDF-aware motion and strict query products.
          - Footstep, trample, wetness, and diagnostics hooks are explicit products or events, not renderer side effects.
      - id: PM-SDF-OW-004
        title: Atmosphere and material response
        kind: design
        state: designing
        goal: Define time, celestial, fog, exposure, material response, and diagnostic products for day/night production identity.
        outcome: Day/night becomes a world/render product family, not a renderer color shortcut.
        dependencies:
          - PM-SDF-OW-002
        roadmap_links:
          - WR-014
          - WR-015
