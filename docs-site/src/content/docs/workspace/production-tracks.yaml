      path: docs-site/src/content/docs/design/active/game-runtime-ui-projection-and-hud-platform-design.md
      required_status: accepted
      reason: Final closeout must follow accepted runtime-proven evidence and audit-handoff doctrine.
    evidence_gates: []
    acceptance_criteria:
    - Closeout links completed runtime proof, diagnostics, docs, examples, planning, roadmap, and production evidence.
    - Known quality gaps are listed truthfully and do not block runtime_proven completion unless they contradict the SDF screen-HUD proof.
    - Any perfectionist_verified claim is blocked behind a separate accepted no-gap audit intake with empty known gaps.
