- id: PT-TRACK-EXECUTION-HARNESS
  title: Generic Track Execution Harness
  state: completed
  owner: workspace
  target_completion_quality: architecture_runtime_proven
  strategic_goal: Prove the generic locked-track execution harness before it is trusted to complete architecture implementation tracks.
  success_criteria:
  - Public production-track commands execute locked tracks only through the clean execution kernel, not through legacy manifest-runner authority.
  - Contract Packs compiled from production, roadmap, manifest, and structured plan sidecars are the only execution authority for locked tracks.
  - Execution Locks are canonical, digest-backed, freshness-checked, and required before full-track or agent-track mutation.
  - All mutating executors run transactionally through isolated workspaces, scoped diff validation, typed validation commands, declared-output import, evidence records, run ledgers, and derived locks.
  - Evidence records are resolver-backed for runtime tests, fixtures, diagnostics, source maps, artifacts, migration, reproducibility, visual output, and handoff decisions.
  - Runtime closeouts, handoff closeouts, and truth-claim updates are structured state transitions that cannot overclaim from prose-only evidence.
  - Agent-track execution is real and transactional, not advertised as available while blocked.
  - No product UI implementation, MaterialProgram work, crate creation, placeholder folders, or shared foundation/meta extraction is introduced by the harness track.
