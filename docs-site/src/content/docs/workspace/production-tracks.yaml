        acceptance_criteria:
          - Product and service needs are declarative Workbench capability data.
          - Product semantics stay in owning domains and formed product contracts.
        completion_quality: bounded_contract
        known_quality_gaps:
          - PM-WB-CAP-003 completed the product/service declaration plane as a bounded milestone; linked WR rows are not all perfectionist_verified.
          - PM-WB-CAP-004 still owns broader full-editor, standalone Material Lab, headless validation, and constrained host presets.
          - PM-WB-CAP-005 remains blocked and out of the non-deferred scope for external component sandbox readiness.
