        known_quality_gaps:
          - PM-WB-CAP-004 completed the multi-host preset slice as a bounded milestone; linked WR rows are not all perfectionist_verified.
          - PM-WB-CAP-005 remains blocked and out of the non-deferred scope for external component sandbox readiness.
