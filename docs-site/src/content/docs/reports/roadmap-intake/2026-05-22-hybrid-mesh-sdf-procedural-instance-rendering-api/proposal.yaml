governance_notes:
- Run architecture governance review before implementation.
- Confirm Clean Architecture dependency direction and DDD owner.
- Record ADR only if the decision changes durable ownership, dependency direction, or cross-domain contracts.
open_questions: []
resolved_questions:
- The first public SDF impostor API is local 2D only; 3D SDF raymarch and sparse residency hooks are out of scope.
- v1 requires explicit primitive, blend, depth, cull, target, local mesh or generated quad, and instance layout policy.
- Discoverability is bounded by public renderer docs, focused procedural instance tests, and a minimal example if docs/tests do not
  demonstrate normal use without renderer-private handles.
