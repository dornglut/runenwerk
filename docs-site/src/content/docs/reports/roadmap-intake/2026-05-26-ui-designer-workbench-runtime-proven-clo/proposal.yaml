- Architecture governance kickoff was run for PM-UI-DESIGNER-WB-008 before final closeout planning.
- domain/ui remains the owner for generic UI definition, target-profile, preview, readiness, binding, recipe, persistence, and visual-layout truth.
- domain/editor remains the owner for UI Designer app-neutral workbench view models, UX Lab evidence adapters, and editor/workbench vocabulary.
