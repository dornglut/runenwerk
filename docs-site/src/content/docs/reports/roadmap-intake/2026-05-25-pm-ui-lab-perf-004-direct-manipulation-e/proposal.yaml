version: 1
idea: PM-UI-LAB-PERF-004 Direct Manipulation Editor Lab UX Closure
source_path: docs-site/src/content/docs/design/accepted/ui-lab-direct-manipulation-ux-closure-design.md
owner: editor
created_at: '2026-05-25'
governance_notes:
- Architecture governance keeps Editor Lab authoring UX, operation review, diagnostics, history, undo/redo presentation,
  runtime proof, and app execution in the editor bounded context.
- domain/ui/ui_definition remains behavior-free and owns only generic UI visual layout operations and target projection
  contracts.
- domain/editor/editor_definition owns editor definition document vocabulary, operation contracts, validation, and deterministic
  diffs.
- domain/editor/editor_shell owns app-neutral surface view models, retained composition helpers, widget/action routing,
  and product-surface projection.
- apps/runenwerk_editor owns concrete draft mutation, operation dispatch, provider execution, session history, preview
  refresh, diagnostics capture, artifact writing, and runtime evidence probes.
- No ADR is required while PM004 preserves the existing description/execution, derived projection, provider seam, graph
  canvas, and capability workbench decisions.
open_questions:
- Which existing action-list or text-only Editor Lab affordance should be retired first after product-surface parity is proven?
- Which retained product-surface artifact is sufficient for native-impossible direct-manipulation evidence in the current
  headless test runtime?
