owner: editor
created_at: '2026-05-25'
governance_notes:
- Architecture governance keeps concrete editor command descriptors, command dispatch, dynamic availability, and app
  diagnostics in apps/runenwerk_editor.
- domain/editor/editor_shell owns app-neutral surface metadata, tool-suite registry validation, and shell projection
  contracts; it must not execute app provider behavior.
- domain/ui/ui_definition remains behavior-free and must not own concrete editor command semantics, provider families,
  surface execution, or shortcut/menu behavior.
- No ADR is required while PM003 preserves app-owned command execution, editor_shell-owned surface contracts, and explicit
  legacy compatibility adapters.
open_questions:
- Which fallback table can be closed first without breaking persisted legacy surface data?
- Which current disabled-reason or route-action duplication should be treated as stale data instead of compatibility?
