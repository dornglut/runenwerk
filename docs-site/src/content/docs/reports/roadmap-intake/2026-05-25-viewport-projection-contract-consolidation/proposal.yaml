- "Split future implementation into bounded follow-on WRs before promotion instead of using this intake as an implementation vehicle."
open_questions:
- "Which accepted design update splits this governance intake into bounded renderer and editor implementation WRs?"
- "Should renderer presentation fit become a generic SurfaceFitPolicy-style contract, remain part of procedural camera policy, or be split into separate world-projection and surface-presentation contracts?"
- "What accepted editor viewport camera contract resolves the dormant ViewportProjection::Orthographic gap without leaking editor concepts into renderer or UI?"
- "Which shared CPU/GPU editor viewport projection helpers or tests prevent picking/render drift?"
- "Which future design, if any, justifies an ADR for cross-domain camera ABI, PreparedViewFrame camera truth, or UI projection ownership?"
