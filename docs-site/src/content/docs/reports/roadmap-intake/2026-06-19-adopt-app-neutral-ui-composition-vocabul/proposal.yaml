governance_notes:
- The user approved the clean-cutover architecture and implementation-readiness amendments.
- domain/ui/ui_composition owns app-neutral structural definition, state, transactions, promotion, deterministic persistence contracts, liveness vocabulary, and fixtures.
- domain/ui/ui_adaptive_composition owns transient projection, reflow, proposals, previews, drag/resize sessions, and semantic docking mechanics.
- Editor and Draw retain provider, extension, policy, content, windowing, and product semantics.
- The cutover uses one branch and one final merge; legacy authorities are temporary compatibility input only.
