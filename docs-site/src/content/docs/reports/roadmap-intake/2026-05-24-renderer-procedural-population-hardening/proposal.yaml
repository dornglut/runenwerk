governance_notes:
- Architecture governance review is required before implementation because this changes renderer graph contracts, GPU
  primitive runtime execution, and scheduling semantics.
- Renderer remains the owner of derived execution data; product, gameplay, world, and streaming source truth remain outside
  renderer ownership.
- No ADR is required for track activation while dependency direction and source-truth ownership remain unchanged; add an ADR
  only if an implementation slice changes those boundaries.
open_questions:
- Can WR-089 remain doctrine-only and prevent hardening from becoming a monolithic implementation row?
- Do WR-090 through WR-093 have disjoint enough write scopes to validate and close independently?
- Is spatial hash/chunked unbounded population work kept in a separate intake instead of being folded into this track?
