open_questions: []
resolved_questions:
- Runtime smoke uses the existing default boids configuration for the canonical example; broader stress counts and duration
  budgets belong to WR-060 production evidence.
- The canonical visual defaults to local 2D SDF impostors through the public procedural API. Mesh or quad comparison paths
  are out of scope unless they remain incidental public-API tests and do not replace the canonical proof.
- WR-059 has no fixed GPU timing failure threshold. It fails on missing runtime timing or explicit unsupported diagnostics,
  missing compute/render/present evidence, fullscreen-per-boid draw shape, or fragment loops over all boids.
