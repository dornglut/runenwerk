version: 1
idea: 'Runtime Frame Pacing, Shader Reload Throttle, And Render Diagnostics Tiers: governed repair for boids/system stutter
  caused by unbounded window redraw scheduling, per-frame shader directory polling, and full render diagnostics work in steady
  state. Add runtime-owned frame pacing policy with continuous capped 60 FPS default and on-demand mode, throttle shader hot
  reload polling to 500ms with force reload bypass, tier render diagnostics so cheap timings/cache state remain every frame
  while full JSON diagnostics run only for debug/capture/provenance/probes/diffs/export/slow-frame/explicit request, and update
  render timing/inspection/debug overlay evidence. Keep render preflight strict and do not lower boid count or move product
  policy.'
