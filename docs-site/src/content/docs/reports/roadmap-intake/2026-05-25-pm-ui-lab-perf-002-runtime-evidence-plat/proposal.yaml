version: 1
idea: PM-UI-LAB-PERF-002 Runtime Evidence Platform Closure
source_path: docs-site/src/content/docs/design/accepted/ui-lab-runtime-evidence-platform-closure-design.md
owner: editor
created_at: '2026-05-25'
governance_notes:
- Architecture governance keeps evidence execution, capability probes, native capture, focus/contrast/timing inspection,
  and artifact writing in apps/runenwerk_editor.
- domain/ui/ui_definition remains behavior-free and must not own provider sessions, screenshots, accessibility tooling,
  timing, or artifact storage.
- domain/editor/editor_shell remains the retained composition and view-model owner, not the evidence runtime owner.
- No ADR is required while PM002 preserves app-owned evidence execution; add an ADR or accepted design update before moving
  no-gap evidence capabilities into a reusable cross-domain platform crate.
open_questions:
- Which no-gap capabilities can be natively captured in the current runtime backend, and which must be recorded as typed
  platform-impossible results after a probe?
- Should the implementation extend the PM006 manifest version or introduce a PM002 no-gap manifest beside it?
