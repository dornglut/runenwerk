  path: docs-site/src/content/docs/reports/closeouts/pm-ui-composition-007-editor-docking-and-cross-window-runtime/closeout.md
  completion_quality: runtime_proven
  evidence_required: *evidence
rollback_policy: discard prepared editor state and compensate any created native window or surface; never restore writable legacy workspace mutation or commit partial core extension binding window or render state
stop_conditions:
- stop if adaptive code gains CompositionCommand materialization or mutable composition authority
- stop if editor or ui domain code imports native window render surface or WGPU handles
- stop if engine code imports editor composition panel provider workspace or app semantics
- stop if core and editor extension cannot prepare commit reject undo and redo atomically
- stop if any structural shell command bypasses ui_composition transaction execution
- stop if legacy workspace becomes writable or remains an active mutation oracle
- stop if a secondary window is proven only by registry metadata instead of a distinct presented frame
- stop if native creation close veto or surface failure can leave partial structural state
- stop if input focus capture or events can fall back to the wrong target
- stop if Region Compass diverges from the selected five-zone plus explicit detach contract
- stop if keyboard touch controller focus contrast text scale reduced motion labels or cancel acceptance is incomplete
- stop if pointer updates clone the full composition or region graph or per-surface rendering clones full canonical state
