  completion_quality: runtime_proven
  evidence_required: *evidence
rollback_policy: reject checkpoint import and preserve the previous active generation, existing runtime consumers, and all legacy files unchanged
stop_conditions:
- stop if WR-182 is not current_candidate or PM-UI-COMPOSITION-002 is not runtime_proven
- stop if canonical bytes or digests depend on insertion order display labels debug formatting or platform line endings
- stop if core and extension metadata can mismatch or a partial bundle can load save or promote
- stop if any failure before pointer replacement can change the active generation
- stop if scope precedence silently falls through a present invalid higher-scope layout
- stop if V1-V5 input is changed migrated deleted or accepted
- stop before app editor Draw adaptive provider session engine windowing ui_surface or foundation work
