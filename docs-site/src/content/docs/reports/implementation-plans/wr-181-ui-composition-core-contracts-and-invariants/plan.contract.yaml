stop_conditions:
- stop if WR-181 is not current_candidate or crate_creation authority is absent
- stop if app, editor, Draw, provider, session, native-window, adaptive, or persistence semantics enter the core
- stop if policy acceptance can be bypassed or transaction rejection mutates state or history
- stop if any fixture implements product behavior
- stop before editing ui_surface, workspace authorities, apps, engine, adapters, net, or foundation
