stop_conditions:
- stop if live shell or runtime state retains WorkspaceState after import
- stop if active app code invokes WorkspaceMutation reduce_workspace replace_workspace_state or a V5 writer
- stop if projection reconstructs WorkspaceState from CompositionState
- stop if core and editor extension can install partially
- stop if provider session route viewport binding or pruning identity remains keyed only by ToolSurfaceInstanceId
- stop if V1-V5 input is changed migrated deleted or accepted
- stop before ui_surface adaptive engine windowing Region Compass runtime or Draw changes
