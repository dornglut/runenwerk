stop_conditions:
- stop if any accepted design requirement lacks source, owner, code subjects, tests, evidence, or semantic verifier IDs
- stop if any strong truth certificate omits a registry-derived source digest
- stop if truth:audit rerun finds any current verifier finding
- stop if task track would report complete while repo-visible authority files are dirty or untracked
- stop if any MaterialProgram, foundation/meta, engine, app, adapter, or unrelated UI feature scope is required
