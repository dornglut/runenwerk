closeout_contract:
  path: docs-site/src/content/docs/reports/closeouts/pm-ui-composition-005-draw-static-projection/closeout.md
  completion_quality: runtime_proven
  evidence_required: *evidence
rollback_policy: reject the checkpoint without aliases or dual projection authority; preserve PM-004 evidence and all drawing document state
stop_conditions:
- stop if projection uses an independent hard-coded topology instead of the ratified region graph
- stop if DrawingWorkspaceProjection or public workspace access remains active
- stop if drawing document stroke brush layer or history authority moves
- stop if the Draw extension duplicates core topology or mounted-content references
- stop if core and Draw extension can install partially
- stop if content liveness mutates or invalidates composition structure
- stop if narrow width silently removes or hides a mounted region
- stop before editor adaptive ui_surface engine windowing native-window persistence repository or Region Compass runtime changes
