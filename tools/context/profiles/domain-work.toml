description = "Domain-level authority and crate entrypoint context across all domains."

include = [
  "AGENTS.md",
  "ARCHITECTURE.md",
  "DEPENDENCY_RULES.md",
  "DOMAIN_MAP.md",
  "CRATES.md",
  "TESTING.md",
  "docs-site/src/content/docs/workspace/start-here.md",
  "docs-site/src/content/docs/workspace/authority-model.md",
  "docs-site/src/content/docs/guidelines/programming-principles.md",
  "docs-site/src/content/docs/domain/**",
  "docs-site/src/content/docs/design/active/**",
  "docs-site/src/content/docs/workspace/planning/active-work.md",
  "docs-site/src/content/docs/workspace/planning/roadmap.md",
  "docs-site/src/content/docs/workspace/planning/production-tracks.md",
  "domain/*/*/Cargo.toml",
  "domain/*/*/src/lib.rs",
  "engine/*/*/Cargo.toml",
  "engine/*/*/src/lib.rs",
  "foundation/*/Cargo.toml",
  "foundation/*/src/lib.rs",
]

exclude = [
  "docs-site/src/content/docs/reports/**",
  "docs-site/src/content/docs/design/superseded/**",
]
