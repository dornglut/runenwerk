[package]
name = "ui_composition"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
blake3 = "1.8.2"
diagnostics = { path = "../../../foundation/diagnostics" }
id = { path = "../../../foundation/id", features = ["serde"] }
ratification = { path = "../../../foundation/ratification", features = ["diagnostics", "serde"] }
ron = "0.8.1"
serde = { version = "1.0.228", features = ["derive"] }
tempfile = "3.25.0"

[dev-dependencies]
proptest = "1.9.0"
serde_json = "1.0.145"

[[bench]]
name = "composition_persistence"
harness = false
