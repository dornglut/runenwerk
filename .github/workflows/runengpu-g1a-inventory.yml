name: RunenGPU G1A Consumer Inventory

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Inventory logical resource identity consumers
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# RunenGPU G1A exact consumer inventory'
            echo
            echo '## Current revision'
            git rev-parse HEAD
            echo
            echo '## Declaration and sequence matches'
            rg -n --glob '*.rs' 'RenderResourceId|RenderResourceIdSequence|GpuWorkResourceId|try_from_raw|\.raw\(' engine apps domain net adapters || true
            echo
            echo '## Imports and public exports'
            rg -n --glob '*.rs' 'use .*RenderResourceId|pub use .*RenderResourceId|RenderResourceId,' engine apps domain net adapters || true
            echo
            echo '## Stable-format risk markers near consumers'
            rg -n --glob '*.rs' 'serde|Serialize|Deserialize|bincode|ron|json|replay|network|wire|persist|cache|artifact|trace' engine apps domain net adapters || true
            echo
            echo '## Candidate source files'
            git grep -l -E 'RenderResourceId|RenderResourceIdSequence' -- '*.rs' | sort
            echo
            echo '## Current focused source excerpts'
            for file in $(git grep -l -E 'RenderResourceId|RenderResourceIdSequence' -- '*.rs' | sort); do
              echo
              echo "### $file"
              rg -n -C 2 'RenderResourceId|RenderResourceIdSequence' "$file" || true
            done
          } > runengpu-g1a-inventory.md

      - uses: actions/upload-artifact@v4
        with:
          name: runengpu-g1a-inventory
          path: runengpu-g1a-inventory.md
          if-no-files-found: error
          retention-days: 5
