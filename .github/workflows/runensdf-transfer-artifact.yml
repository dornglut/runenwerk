name: RunenSDF Transfer Artifact

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package accepted SDF source baseline
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    env:
      SOURCE_SHA: 8de096259eab30f8d67672010df9190970d0bfc4
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Verify source baseline
        run: |
          git cat-file -e "$env:SOURCE_SHA^{commit}"
          git cat-file -e "$env:SOURCE_SHA`:domain/sdf/Cargo.toml"
          git cat-file -e "$env:SOURCE_SHA`:domain/sdf/src/lib.rs"

      - name: Create deterministic transfer archive
        run: |
          git archive --format=zip --output=runensdf-transfer.zip $env:SOURCE_SHA domain/sdf/Cargo.toml domain/sdf/src domain/sdf/tests
          $hash = (Get-FileHash runensdf-transfer.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          @"
          source_repository=Crystonix/runenwerk
          source_commit=$env:SOURCE_SHA
          source_path=domain/sdf
          archive_sha256=$hash
          "@ | Set-Content -NoNewline runensdf-transfer.provenance

      - name: Upload transfer evidence
        uses: actions/upload-artifact@v4
        with:
          name: runensdf-transfer-${{ env.SOURCE_SHA }}
          path: |
            runensdf-transfer.zip
            runensdf-transfer.provenance
          if-no-files-found: error
          retention-days: 7
