name: Workflow Retirement Inventory

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build retirement inventory
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > workflow-retirement-inventory.txt
          from __future__ import annotations

          import ast
          import subprocess
          import sys
          from collections import defaultdict, deque
          from pathlib import Path

          root = Path('tools/workflow')
          files = sorted(root.rglob('*.py'))
          module_for = {}
          file_for = {}
          for path in files:
              rel = path.relative_to(root).with_suffix('')
              parts = list(rel.parts)
              if parts[-1] == '__init__':
                  parts = parts[:-1]
              module = '.'.join(parts)
              module_for[path] = module
              file_for[module] = path

          def resolve_local(module: str) -> Path | None:
              if module in file_for:
                  return file_for[module]
              candidates = [name for name in file_for if name.endswith('.' + module)]
              return file_for[candidates[0]] if len(candidates) == 1 else None

          imports: dict[Path, set[Path]] = defaultdict(set)
          for path in files:
              try:
                  tree = ast.parse(path.read_text(encoding='utf-8'))
              except SyntaxError:
                  continue
              current = module_for[path].split('.') if module_for[path] else []
              for node in ast.walk(tree):
                  names: list[str] = []
                  if isinstance(node, ast.Import):
                      names.extend(alias.name for alias in node.names)
                  elif isinstance(node, ast.ImportFrom):
                      base = node.module or ''
                      if node.level:
                          prefix = current[:-node.level]
                          base = '.'.join(prefix + ([base] if base else []))
                      names.append(base)
                  for name in names:
                      target = resolve_local(name)
                      if target and target != path:
                          imports[path].add(target)

          roots = [
              root / 'roadmap_state.py',
              root / 'generate_roadmap_docs.py',
              root / 'production_state.py',
              root / 'generate_production_docs.py',
              root / 'ux_lab_terminology.py',
          ]
          reachable: set[Path] = set()
          queue = deque(roots)
          while queue:
              path = queue.popleft()
              if path in reachable:
                  continue
              reachable.add(path)
              queue.extend(imports.get(path, ()))

          print('# Legacy workflow retirement inventory')
          print()
          print('## Summary')
          print(f'- Python files: {len(files)}')
          print(f'- Retained entrypoints: {len(roots)}')
          print(f'- Files reachable from retained entrypoints: {len(reachable)}')
          print(f'- Python deletion candidates: {len(set(files) - reachable)}')
          print()
          print('## Retained entrypoint dependency closure')
          for path in sorted(reachable):
              print(path.as_posix())
          print()
          print('## Python deletion candidates')
          for path in sorted(set(files) - reachable):
              print(path.as_posix())
          print()
          print('## Local import graph')
          for path in files:
              deps = ', '.join(sorted(p.as_posix() for p in imports.get(path, ()))) or '-'
              print(f'{path.as_posix()}: {deps}')

          tracked = subprocess.check_output(['git', 'ls-files'], text=True).splitlines()
          print()
          print('## Non-Python legacy entrypoints')
          for path in tracked:
              if path in {'workflow', 'workflow.cmd', 'quiet_editor_gate.sh', 'quiet_full_gate.sh'}:
                  print(path)

          print()
          print('## Python outside tools/workflow')
          external_imports: dict[str, set[str]] = defaultdict(set)
          for raw in tracked:
              if not raw.endswith('.py') or raw.startswith('tools/workflow/'):
                  continue
              path = Path(raw)
              try:
                  tree = ast.parse(path.read_text(encoding='utf-8'))
              except (OSError, SyntaxError):
                  continue
              for node in ast.walk(tree):
                  names: list[str] = []
                  if isinstance(node, ast.Import):
                      names.extend(alias.name for alias in node.names)
                  elif isinstance(node, ast.ImportFrom) and node.module:
                      names.append(node.module)
                  for name in names:
                      top = name.split('.', 1)[0]
                      if top not in sys.stdlib_module_names:
                          external_imports[raw].add(top)
          for path in sorted(external_imports):
              print(f"{path}: {', '.join(sorted(external_imports[path]))}")

          print()
          print('## Active references to deprecated executable surfaces')
          terms = [
              'track_control_cli.py', 'production_track_cli.py', 'execution/cli.py',
              'truth/cli.py', 'parallel_batch.py', 'ai_task.py', 'production_goal.py',
              'quiet_editor_gate.sh', 'quiet_full_gate.sh', 'workflow.cmd',
              'execution-contract-packs', 'execution-locks', 'truth-verifier-registry',
              'track-execution-manifests', 'track-execution-runs', 'truth-certificates',
              'production-tracks.yaml', 'roadmap-items.yaml', 'roadmap-archive.yaml',
              'roadmap-deferred.yaml', 'production-track-index.md',
              'production-track-planning-model.md',
          ]
          for term in terms:
              result = subprocess.run(
                  ['git', 'grep', '-n', '-F', term, '--', ':!docs-site/src/content/docs/reports/agent-transcripts/**'],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.DEVNULL,
              )
              lines = [line for line in result.stdout.splitlines() if 'workflow-retirement-inventory.yml' not in line]
              if lines:
                  print(f'### {term}')
                  print('\n'.join(lines))

          print()
          print('## Tracked active generated state')
          prefixes = (
              'docs-site/src/content/docs/workspace/execution-contract-packs/',
              'docs-site/src/content/docs/workspace/execution-locks/',
              'docs-site/src/content/docs/workspace/truth-conformance-specs/',
              'docs-site/src/content/docs/workspace/track-execution-manifests/',
              'docs-site/src/content/docs/reports/track-execution-manifests/',
              'docs-site/src/content/docs/reports/track-execution-runs/',
              'docs-site/src/content/docs/reports/truth-certificates/',
          )
          exact = {'docs-site/src/content/docs/workspace/truth-verifier-registry.yaml'}
          for path in tracked:
              if path in exact or path.startswith(prefixes):
                  print(path)

          print()
          print('## Structured planning files')
          planning_terms = (
              'roadmap-items', 'roadmap-archive', 'roadmap-deferred',
              'production-track', 'production_tracks', 'production-tracks',
              'batch-manifest',
          )
          for path in tracked:
              if any(term in path for term in planning_terms):
                  print(path)
          PY

      - name: Upload inventory
        uses: actions/upload-artifact@v4
        with:
          name: workflow-retirement-inventory
          path: workflow-retirement-inventory.txt
          if-no-files-found: error
          retention-days: 3
