name: Remove obsolete workflow guard

on:
  push:
    branches:
      - agent/workflow-authority-cutover
    paths:
      - ".github/workflows/migrate-workflow-guard.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v7
        with:
          ref: agent/workflow-authority-cutover
          fetch-depth: 1

      - name: Remove editor-owned repository workflow assertion
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/runenwerk_editor/tests/viewport_architecture_guards.rs")
          text = path.read_text(encoding="utf-8")
          start_marker = "#[test]\nfn validation_gates_have_quick_and_full_paths_with_nextest_fallback() {"
          end_marker = "#[test]\nfn surface_dispatch_facade_delegates_to_surface_handlers() {"
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit("obsolete workflow guard markers not found")
          path.write_text(text[:start] + text[end:], encoding="utf-8", newline="\n")
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/migrate-workflow-guard.yml

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/runenwerk_editor/tests/viewport_architecture_guards.rs .github/workflows/migrate-workflow-guard.yml
          git commit -m "Remove obsolete editor workflow gate guard"
          git push origin HEAD:agent/workflow-authority-cutover
