name: Implement RunenGPU G1A

on:
  push:
    branches:
      - impl/runengpu-g1a-work-resource-id

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: impl/runengpu-g1a-work-resource-id
          fetch-depth: 0

      - name: Apply G1A identity migration
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          root = Path('.')
          old_files = sorted(
              Path(path)
              for path in subprocess.check_output(
                  ['git', 'grep', '-l', '-E', 'RenderResourceId|RenderResourceIdSequence', '--', '*.rs'],
                  text=True,
              ).splitlines()
          )
          if len(old_files) != 38:
              raise SystemExit(f'expected 38 current consumers, found {len(old_files)}')

          gpu_dir = Path('engine/src/plugins/gpu/api')
          gpu_dir.mkdir(parents=True, exist_ok=True)

          Path('engine/src/plugins/gpu/mod.rs').write_text(
              '//! Internal future-transferable RunenGPU contracts.\n\n'
              'pub mod api;\n\n'
              'pub use api::*;\n',
              encoding='utf-8',
          )
          Path('engine/src/plugins/gpu/api/mod.rs').write_text(
              '//! Backend-neutral GPU execution vocabulary.\n\n'
              'mod work_resource_id;\n\n'
              'pub use work_resource_id::{\n'
              '    GpuWorkResourceId, GpuWorkResourceIdAllocationError,\n'
              '    GpuWorkResourceIdAllocator,\n'
              '};\n',
              encoding='utf-8',
          )
          Path('engine/src/plugins/gpu/api/work_resource_id.rs').write_text(r'''use core::fmt;
use core::num::NonZeroU64;

/// Opaque identity for one logical resource in a bounded GPU work graph.
///
/// The numeric value is process-local diagnostic data. It is not a persisted,
/// replay, network, wire, source-asset, or cross-process cache identity.
#[repr(transparent)]
#[derive(Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
pub struct GpuWorkResourceId(NonZeroU64);

impl GpuWorkResourceId {
    /// Returns the process-local diagnostic value.
    ///
    /// This value has no stable-format or cross-process compatibility guarantee.
    #[must_use]
    pub const fn raw(self) -> u64 {
        self.0.get()
    }
}

impl fmt::Debug for GpuWorkResourceId {
    fn fmt(&self, formatter: &mut fmt::Formatter<'_>) -> fmt::Result {
        formatter
            .debug_tuple("GpuWorkResourceId")
            .field(&self.raw())
            .finish()
    }
}

impl fmt::Display for GpuWorkResourceId {
    fn fmt(&self, formatter: &mut fmt::Formatter<'_>) -> fmt::Result {
        self.raw().fmt(formatter)
    }
}

/// Failure to allocate another logical GPU work-resource identity.
#[derive(Debug, Clone, Copy, PartialEq, Eq)]
pub enum GpuWorkResourceIdAllocationError {
    /// The complete nonzero `u64` identity space has been allocated.
    Exhausted,
}

impl fmt::Display for GpuWorkResourceIdAllocationError {
    fn fmt(&self, formatter: &mut fmt::Formatter<'_>) -> fmt::Result {
        match self {
            Self::Exhausted => formatter.write_str("GPU work-resource identity space is exhausted"),
        }
    }
}

impl std::error::Error for GpuWorkResourceIdAllocationError {}

/// Deterministic allocator for graph-local logical GPU work-resource identities.
#[derive(Debug, Clone)]
pub struct GpuWorkResourceIdAllocator {
    next: Option<NonZeroU64>,
}

impl GpuWorkResourceIdAllocator {
    /// Creates an allocator whose first issued identity has diagnostic value `1`.
    #[must_use]
    pub const fn new() -> Self {
        Self {
            next: NonZeroU64::new(1),
        }
    }

    /// Allocates the next identity without wrapping, saturation, or reuse.
    pub fn allocate(
        &mut self,
    ) -> Result<GpuWorkResourceId, GpuWorkResourceIdAllocationError> {
        let current = self
            .next
            .ok_or(GpuWorkResourceIdAllocationError::Exhausted)?;
        self.next = current.get().checked_add(1).and_then(NonZeroU64::new);
        Ok(GpuWorkResourceId(current))
    }
}

impl Default for GpuWorkResourceIdAllocator {
    fn default() -> Self {
        Self::new()
    }
}

#[cfg(test)]
mod tests {
    use super::*;
    use std::collections::{BTreeSet, HashSet};

    #[test]
    fn first_allocation_is_nonzero_and_deterministic() {
        let mut first = GpuWorkResourceIdAllocator::new();
        let mut second = GpuWorkResourceIdAllocator::new();

        let first_id = first.allocate().expect("first allocation must succeed");
        let second_id = second.allocate().expect("first allocation must succeed");

        assert_eq!(first_id.raw(), 1);
        assert_eq!(first_id, second_id);
    }

    #[test]
    fn allocations_are_distinct_and_monotonic() {
        let mut allocator = GpuWorkResourceIdAllocator::new();
        let first = allocator.allocate().expect("allocation must succeed");
        let second = allocator.allocate().expect("allocation must succeed");

        assert!(first < second);
        assert_ne!(first, second);
        assert_eq!(first.to_string(), "1");
        assert_eq!(format!("{first:?}"), "GpuWorkResourceId(1)");

        let ordered = BTreeSet::from([second, first]);
        let hashed = HashSet::from([first, second]);
        assert_eq!(ordered.len(), 2);
        assert_eq!(hashed.len(), 2);
    }

    #[test]
    fn exhaustion_is_explicit_and_never_wraps() {
        let mut allocator = GpuWorkResourceIdAllocator {
            next: NonZeroU64::new(u64::MAX),
        };

        let final_id = allocator.allocate().expect("final allocation must succeed");
        assert_eq!(final_id.raw(), u64::MAX);
        assert_eq!(
            allocator.allocate(),
            Err(GpuWorkResourceIdAllocationError::Exhausted)
        );
    }

    #[test]
    fn identity_source_has_no_forbidden_dependency_or_raw_constructor() {
        let source = include_str!("work_resource_id.rs");
        for forbidden in [
            "plugins::render",
            "wgpu::",
            "winit::",
            "ecs::",
            "runensdf",
            "runenui",
            "material_graph",
            "world_sdf",
            "try_from_raw",
            "TryFrom<u64>",
            "From<u64>",
        ] {
            assert!(!source.contains(forbidden), "forbidden token: {forbidden}");
        }
    }
}
''', encoding='utf-8')

          plugins = Path('engine/src/plugins/mod.rs')
          text = plugins.read_text(encoding='utf-8')
          if 'pub mod gpu;' not in text:
              text = text.replace('pub mod grid;\n', 'pub mod grid;\npub mod gpu;\n')
          if 'pub use gpu::*;' not in text:
              text = text.replace('pub use grid::*;\n', 'pub use grid::*;\npub use gpu::*;\n')
          plugins.write_text(text, encoding='utf-8')

          ids = Path('engine/src/plugins/render/api/ids.rs')
          text = ids.read_text(encoding='utf-8')
          block = '#[id]\npub struct RenderResourceId;\n\n'
          if block not in text:
              raise SystemExit('RenderResourceId declaration block not found')
          ids.write_text(text.replace(block, ''), encoding='utf-8')

          def clean_use_groups(text):
              pattern = re.compile(r'use\s+([^;{]+)::\{(.*?)\};', re.DOTALL)
              def replace(match):
                  prefix, body = match.group(1), match.group(2)
                  entries = [entry.strip() for entry in body.split(',') if entry.strip()]
                  entries = [
                      entry for entry in entries
                      if entry not in {'GpuWorkResourceId', 'GpuWorkResourceIdAllocator'}
                  ]
                  if not entries:
                      return ''
                  return f'use {prefix}::{{' + ', '.join(entries) + '};'
              return pattern.sub(replace, text)

          for path in old_files:
              text = path.read_text(encoding='utf-8')
              text = text.replace('RenderResourceIdSequence', 'GpuWorkResourceIdAllocator')
              text = text.replace('RenderResourceId', 'GpuWorkResourceId')
              text = text.replace(
                  'crate::plugins::render::GpuWorkResourceIdAllocator',
                  'crate::plugins::gpu::GpuWorkResourceIdAllocator',
              )
              text = text.replace(
                  'crate::plugins::render::GpuWorkResourceId',
                  'crate::plugins::gpu::GpuWorkResourceId',
              )
              text = text.replace(
                  'engine::plugins::render::GpuWorkResourceIdAllocator',
                  'engine::plugins::gpu::GpuWorkResourceIdAllocator',
              )
              text = text.replace(
                  'engine::plugins::render::GpuWorkResourceId',
                  'engine::plugins::gpu::GpuWorkResourceId',
              )
              text = clean_use_groups(text)
              text = re.sub(
                  r'^use\s+[^;]+::GpuWorkResourceId(?:Allocator)?;\n',
                  '',
                  text,
                  flags=re.MULTILINE,
              )

              needed = []
              if 'GpuWorkResourceId' in text:
                  needed.append('GpuWorkResourceId')
              if 'GpuWorkResourceIdAllocator' in text:
                  needed.append('GpuWorkResourceIdAllocator')
              if needed and path.as_posix() != 'engine/src/plugins/render/api/ids.rs':
                  root_path = (
                      'crate::plugins::gpu'
                      if path.as_posix().startswith('engine/src/')
                      else 'engine::plugins::gpu'
                  )
                  import_line = f'use {root_path}::{{' + ', '.join(sorted(set(needed))) + '};\n'
                  if import_line not in text:
                      first_use = re.search(r'(?m)^use ', text)
                      if first_use:
                          text = text[:first_use.start()] + import_line + text[first_use.start():]
                      else:
                          text = import_line + text
              path.write_text(text, encoding='utf-8')
          PY

          cargo fmt --all

          set +e
          cargo check -p engine --all-targets --locked > /tmp/g1a-check.log 2>&1
          check_status=$?
          set -e
          cat /tmp/g1a-check.log

          rm .github/workflows/implement-runengpu-g1a.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Implement RunenGPU G1A logical work-resource identity"
          git push origin HEAD:impl/runengpu-g1a-work-resource-id

          exit "$check_status"
