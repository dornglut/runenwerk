name: Run GPU Render Package Correction

on:
  push:
    branches:
      - docs/correct-gpu-render-architecture

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: docs/correct-gpu-render-architecture
          fetch-depth: 0

      - name: Correct package authority
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              Path('ARCHITECTURE.md'),
              Path('DEPENDENCY_RULES.md'),
              Path('DOMAIN_MAP.md'),
              Path('docs-site/src/content/docs/adr/accepted/0014-repository-family-extraction-boundaries.md'),
              Path('docs-site/src/content/docs/architecture/repository-family-architecture.md'),
              Path('docs-site/src/content/docs/reports/investigations/repository-family-current-state-investigation.md'),
              Path('docs-site/src/content/docs/workspace/planning/decision-register.md'),
          ]

          for path in files:
              text = path.read_text(encoding='utf-8')
              text = text.replace(
                  'RunenECS      Crystonix/runen-ecs        runen-ecs     runen_ecs',
                  'RunenECS      target Crystonix/runen-ecs package topology governed separately',
              )
              text = text.replace(
                  'RunenUI       Crystonix/runen-ui         runen-ui      runen_ui',
                  'RunenUI       Crystonix/runen-ui         existing workspace; current packages include runenui_core and runenui_runtime',
              )
              text = text.replace(
                  'Crystonix/runen-ecs        runen-ecs     runen_ecs',
                  'target Crystonix/runen-ecs package topology governed separately',
              )
              text = text.replace(
                  'Crystonix/runen-ui         runen-ui      runen_ui',
                  'Crystonix/runen-ui         existing workspace; current packages include runenui_core and runenui_runtime',
              )
              text = text.replace(
                  'Reusable ECS semantics            -> Crystonix/runen-ecs, package runen-ecs',
                  'Reusable ECS semantics            -> target Crystonix/runen-ecs; package topology governed separately',
              )
              text = text.replace(
                  'Reusable UI framework             -> Crystonix/runen-ui, package runen-ui',
                  'Reusable UI framework             -> Crystonix/runen-ui workspace; current packages include runenui_core and runenui_runtime',
              )
              path.write_text(text, encoding='utf-8')

          path = Path('ARCHITECTURE.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('## Initial repository packages', '## Repository and package identity')
          text = text.replace(
              'Each framework begins with one public package. Internal modules carry boundaries',
              'RunenGPU and RunenRender each begin with one public package. Internal modules carry boundaries',
          )
          text = text.replace(
              'Do not create speculative `core`, `wgpu`, `gpu`, facade, macro, testing, capture,',
              'RunenECS package topology remains governed separately. RunenUI is an existing multi-package workspace.\n\nDo not create speculative GPU/render `core`, `wgpu`, `gpu`, facade, macro, testing, capture,',
              1,
          )
          path.write_text(text, encoding='utf-8')

          path = Path('DEPENDENCY_RULES.md')
          text = path.read_text(encoding='utf-8')
          text = re.sub(
              r'## Initial package rule\n\nEach framework repository begins with one public package:\n\n```text\nrunen-sdf\nrunen-ecs\nrunen-gpu\nrunen-render\nrunen-ui\n```\n\n',
              '## Initial package rule\n\nRunenGPU and RunenRender each begin with one public package:\n\n```text\nrunen-gpu\nrunen-render\n```\n\nRunenSDF already uses one public `runen-sdf` package. RunenECS topology is governed separately. RunenUI is an existing multi-package workspace.\n\n',
              text,
          )
          text = text.replace(
              'Do not create speculative `core`, `wgpu`, `gpu`, facade, macro, testing, capture,',
              'Do not create speculative GPU/render `core`, `wgpu`, `gpu`, facade, macro, testing, capture,',
              1,
          )
          path.write_text(text, encoding='utf-8')

          for raw in [
              'docs-site/src/content/docs/adr/accepted/0014-repository-family-extraction-boundaries.md',
              'docs-site/src/content/docs/architecture/repository-family-architecture.md',
              'docs-site/src/content/docs/workspace/planning/decision-register.md',
          ]:
              path = Path(raw)
              text = path.read_text(encoding='utf-8')
              text = text.replace(
                  'Each new framework repository begins with one public package.',
                  'RunenGPU and RunenRender each begin with one public package.',
              )
              text = text.replace(
                  'Each framework begins with one public package.',
                  'RunenGPU and RunenRender each begin with one public package.',
              )
              marker = 'RunenGPU and RunenRender each begin with one public package.'
              if marker in text and 'This decision does not redefine RunenUI' not in text:
                  text = text.replace(
                      marker,
                      marker + ' This decision does not redefine RunenUI package topology or settle RunenECS package topology.',
                      1,
                  )
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No correction required.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ARCHITECTURE.md DEPENDENCY_RULES.md DOMAIN_MAP.md docs-site/src/content/docs
          git commit -m 'Narrow GPU render package authority'
          git push origin HEAD:docs/correct-gpu-render-architecture
