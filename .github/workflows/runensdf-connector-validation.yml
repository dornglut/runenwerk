name: RunenSDF Connector Validation

on:
  push:
    branches:
      - impl/runensdf-boundary-correction
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: impl/runensdf-boundary-correction
          fetch-depth: 0

      - name: Install stable Rust tools
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Regenerate workspace lockfile
        run: cargo generate-lockfile

      - name: Format workspace
        run: cargo fmt --all

      - name: Test RunenSDF package
        run: cargo test -p sdf --locked

      - name: Clippy RunenSDF package
        run: cargo clippy -p sdf --all-targets --locked -- -D warnings

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Commit generated and formatted files
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git diff --quiet -- Cargo.lock domain/sdf; then
            echo "Cargo.lock and SDF sources already match generated/formatted output."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock domain/sdf
          git commit -m "Format and lock SDF boundary correction"
          git push origin HEAD:impl/runensdf-boundary-correction
