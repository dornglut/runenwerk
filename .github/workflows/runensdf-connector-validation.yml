name: RunenSDF Connector Validation

on:
  push:
    branches:
      - impl/runensdf-boundary-correction
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: impl/runensdf-boundary-correction
          fetch-depth: 0

      - name: Install stable Rust tools
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Verify bounded SDF lockfile entry
        shell: python
        run: |
          from pathlib import Path

          text = Path("Cargo.lock").read_text(encoding="utf-8")
          expected = '''[[package]]
          name = "sdf"
          version = "0.1.0"
          dependencies = [
           "glam 0.31.1",
           "thiserror 2.0.18",
          ]
          '''
          if text.count(expected) != 1:
              raise SystemExit("Cargo.lock does not contain exactly one corrected sdf package block")

      - name: Verify Cargo metadata
        run: cargo metadata --format-version 1 --locked --no-deps > /dev/null

      - name: Inspect RunenSDF dependency tree
        run: |
          cargo tree -p sdf --locked
          cargo tree -i sdf --workspace --locked

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Test RunenSDF package
        run: cargo test -p sdf --locked

      - name: Clippy RunenSDF package
        run: cargo clippy -p sdf --all-targets --locked -- -D warnings

      - name: Capture workspace tests
        shell: bash
        run: |
          set +e
          cargo test --workspace --locked > workspace-test.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > workspace-test.status
          tail -n 120 workspace-test.log

      - name: Upload workspace test log
        uses: actions/upload-artifact@v4
        with:
          name: runensdf-workspace-test-log
          path: |
            workspace-test.log
            workspace-test.status
          if-no-files-found: error

      - name: Capture workspace Clippy
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > workspace-clippy.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > workspace-clippy.status
          tail -n 120 workspace-clippy.log

      - name: Upload workspace Clippy log
        uses: actions/upload-artifact@v4
        with:
          name: runensdf-workspace-clippy-log
          path: |
            workspace-clippy.log
            workspace-clippy.status
          if-no-files-found: error

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install docs dependencies
        run: pnpm --dir docs-site install --frozen-lockfile

      - name: Capture documentation validation
        shell: bash
        run: |
          set +e
          python tools/docs/validate_docs.py > docs-validator.log 2>&1
          validator_status=$?
          pnpm --dir docs-site build > docs-build.log 2>&1
          build_status=$?
          set -e
          printf '%s\n' "$validator_status" > docs-validator.status
          printf '%s\n' "$build_status" > docs-build.status
          tail -n 80 docs-validator.log
          tail -n 80 docs-build.log

      - name: Upload documentation logs
        uses: actions/upload-artifact@v4
        with:
          name: runensdf-docs-validation-log
          path: |
            docs-validator.log
            docs-validator.status
            docs-build.log
            docs-build.status
          if-no-files-found: error

      - name: Verify clean generated state
        shell: bash
        run: |
          git diff --check
          git status --short
          test -z "$(git status --short --untracked-files=no)"

      - name: Enforce captured command results
        shell: bash
        run: |
          test "$(cat workspace-test.status)" -eq 0
          test "$(cat workspace-clippy.status)" -eq 0
          test "$(cat docs-validator.status)" -eq 0
          test "$(cat docs-build.status)" -eq 0
