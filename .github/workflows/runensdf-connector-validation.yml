name: RunenSDF Connector Validation

on:
  push:
    branches:
      - impl/runensdf-boundary-correction
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: impl/runensdf-boundary-correction
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 11
        run: npm install --global pnpm@11.0.0

      - name: Capture docs dependency installation
        shell: bash
        run: |
          set +e
          pnpm --dir docs-site install --frozen-lockfile > docs-install.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > docs-install.status
          cat docs-install.log

      - name: Upload docs install diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: runensdf-docs-install-log
          path: |
            docs-install.log
            docs-install.status
          if-no-files-found: error

      - name: Enforce docs install result
        run: test "$(cat docs-install.status)" -eq 0
