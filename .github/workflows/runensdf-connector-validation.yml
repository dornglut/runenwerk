name: RunenSDF Connector Validation

on:
  push:
    branches:
      - impl/runensdf-boundary-correction
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: impl/runensdf-boundary-correction
          fetch-depth: 0

      - name: Ensure completion index entry
        shell: python
        run: |
          from pathlib import Path

          path = Path("docs-site/src/content/docs/workspace/planning/completed-work.md")
          text = path.read_text(encoding="utf-8")
          closeout = "  - ../../reports/closeouts/pt-runensdf-002-boundary-correction-closeout.md\n"
          if closeout not in text:
              marker = "  - ../../reports/closeouts/README.md\n"
              text = text.replace(marker, marker + closeout, 1)

          entry = """## Recently completed repository-family work

          - `PT-RUNENSDF-002` RunenSDF Boundary Correction: completed 2026-07-20 through PR #116. The SDF package now owns validated bounds/rays, signed-value and conservative-step semantics, explicit exact-distance capability, validated construction, structured query outcomes, and fallible normal estimation without depending on Runenwerk geometry. Closeout report: `../../reports/closeouts/pt-runensdf-002-boundary-correction-closeout.md`. Follow-up is queued planning for `PT-RUNENSDF-003`; external repository creation and source transfer remain separately unauthorized.

          """
          if "## Recently completed repository-family work" not in text:
              marker = "This file is a short completion index. Detailed evidence belongs in `../../reports/closeouts/` when a completion record would become too large.\n\n"
              text = text.replace(marker, marker + entry, 1)

          path.write_text(text, encoding="utf-8")

      - name: Commit completion index when needed
        shell: bash
        run: |
          if git diff --quiet -- docs-site/src/content/docs/workspace/planning/completed-work.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs-site/src/content/docs/workspace/planning/completed-work.md
          git commit -m "Index completed RunenSDF boundary phase"
          git push origin HEAD:impl/runensdf-boundary-correction

      - name: Install stable Rust tools
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Verify bounded SDF lockfile entry
        shell: python
        run: |
          from pathlib import Path

          text = Path("Cargo.lock").read_text(encoding="utf-8")
          expected = '''[[package]]
          name = "sdf"
          version = "0.1.0"
          dependencies = [
           "glam 0.31.1",
           "thiserror 2.0.18",
          ]
          '''
          if text.count(expected) != 1:
              raise SystemExit("Cargo.lock does not contain exactly one corrected sdf package block")

      - name: Verify metadata and dependency direction
        run: |
          cargo metadata --format-version 1 --locked --no-deps > /dev/null
          cargo tree -p sdf --locked
          cargo tree -i sdf --workspace --locked

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Test RunenSDF package
        run: cargo test -p sdf --locked

      - name: Clippy RunenSDF package
        run: cargo clippy -p sdf --all-targets --locked -- -D warnings

      - name: Check complete workspace API compatibility
        run: cargo check --workspace --all-targets --locked

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 11
        run: npm install --global pnpm@11.0.0

      - name: Install docs dependencies
        run: pnpm --dir docs-site install --frozen-lockfile

      - name: Validate documentation authority
        run: python tools/docs/validate_docs.py

      - name: Build documentation site
        run: pnpm --dir docs-site build

      - name: Verify clean tracked state
        run: |
          git diff --check
          test -z "$(git status --short --untracked-files=no)"
