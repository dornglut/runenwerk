name: Documentation Build

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-validation.yml"
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pinned pnpm
        run: npm install --global pnpm@11.0.0

      - name: Install documentation dependencies
        run: pnpm --dir docs-site install --frozen-lockfile

      - name: Build documentation site
        run: pnpm --dir docs-site build 2>&1 | tee docs-build.log

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-build-diagnostics
          path: docs-build.log
          if-no-files-found: warn
          retention-days: 3

      - name: Remove build diagnostics
        if: always()
        run: rm -f docs-build.log

      - name: Check diff hygiene
        run: git diff --check

      - name: Prove build leaves tracked state clean
        run: |
          status="$(git status --short)"
          if [ -n "$status" ]; then
            printf 'Documentation build changed tracked state:\n%s\n' "$status" >&2
            exit 1
          fi
