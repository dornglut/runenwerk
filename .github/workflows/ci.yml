name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        run: pipx install uv

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin"

      - name: Add local bin
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Dagger
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="$HOME/.local/bin" sh

      - name: Run local CI pipeline
        run: task ci:local
