name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Repository baseline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo data
        uses: Swatinem/rust-cache@v2

      - name: Run canonical validation baseline
        run: cargo validate 2>&1 | tee validation.log

      - name: Upload validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-diagnostics
          path: validation.log
          if-no-files-found: error
          retention-days: 3

      - name: Remove validation diagnostics
        if: always()
        run: rm -f validation.log
