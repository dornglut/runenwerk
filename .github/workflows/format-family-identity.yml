```''',
                      '''```text
product      repository                  package/workspace identity
RunenSDF     Crystonix/runen-sdf         runen-sdf / runen_sdf
RunenECS     target Crystonix/runen-ecs  governed by RunenECS boundary work
RunenGPU     Crystonix/runen-gpu         runen-gpu / runen_gpu
