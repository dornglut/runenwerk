name: Format Family Identity

on:
  push:
    branches:
      - docs/correct-gpu-render-architecture

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: docs/correct-gpu-render-architecture
          fetch-depth: 0

      - name: Format identity tables and prose
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'ARCHITECTURE.md': [
                  (
                      '''```text
repository                 package       crate
Crystonix/runen-sdf        runen-sdf     runen_sdf
target Crystonix/runen-ecs package topology governed separately
Crystonix/runen-gpu        runen-gpu     runen_gpu
Crystonix/runen-render     runen-render  runen_render
Crystonix/runen-ui         existing workspace; current packages include runenui_core and runenui_runtime
```''',
                      '''```text
product      repository                  package/workspace identity
RunenSDF     Crystonix/runen-sdf         runen-sdf / runen_sdf
RunenECS     target Crystonix/runen-ecs  governed by RunenECS boundary work
RunenGPU     Crystonix/runen-gpu         runen-gpu / runen_gpu
RunenRender  Crystonix/runen-render      runen-render / runen_render
RunenUI      Crystonix/runen-ui          current packages include runenui_core and runenui_runtime
```''',
                  ),
                  (
                      'RunenGPU and RunenRender each begin with one public package. Internal modules carry boundaries\nuntil',
                      'RunenGPU and RunenRender each begin with one public package. Internal modules\ncarry boundaries until',
                  ),
                  (
                      'RunenECS package topology remains governed separately. RunenUI is an existing multi-package workspace.',
                      'RunenECS package topology remains governed separately. RunenUI is an existing\nmulti-package workspace.',
                  ),
                  (
                      'Do not create speculative GPU/render `core`, `wgpu`, `gpu`, facade, macro, testing, capture,',
                      'Do not create speculative GPU/render `core`, `wgpu`, `gpu`, facade, macro,\ntesting, capture,',
                  ),
              ],
              'docs-site/src/content/docs/adr/accepted/0014-repository-family-extraction-boundaries.md': [
                  (
                      '''```text
product       repository                 package       crate
RunenSDF      Crystonix/runen-sdf        runen-sdf     runen_sdf
RunenECS      target Crystonix/runen-ecs package topology governed separately
