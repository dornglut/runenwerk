```''',
                  ),
                  (
                      'RunenGPU and RunenRender each begin with one public package. This decision does not redefine RunenUI package topology or settle RunenECS package topology. Additional GPU/render',
                      'RunenGPU and RunenRender each begin with one public package. This decision does\nnot redefine RunenUI package topology or settle RunenECS package topology.\nAdditional GPU/render',
                  ),
              ],
          }

          for raw, pairs in replacements.items():
              path = Path(raw)
              text = path.read_text(encoding='utf-8')
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f'missing expected formatting block in {raw}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ARCHITECTURE.md docs-site/src/content/docs
          git commit -m 'Polish repository family identity tables'
          git push origin HEAD:docs/correct-gpu-render-architecture
