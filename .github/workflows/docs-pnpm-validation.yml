name: Docs pnpm validation

on:
  push:
    branches:
      - fix/docs-pnpm-build-approvals
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout tooling branch
        uses: actions/checkout@v4
        with:
          ref: fix/docs-pnpm-build-approvals
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 11
        run: npm install --global pnpm@11.0.0

      - name: Install docs dependencies
        run: pnpm --dir docs-site install --frozen-lockfile

      - name: Capture documentation validation
        shell: bash
        run: |
          set +e
          python tools/docs/validate_docs.py > docs-validator.log 2>&1
          validator_status=$?
          pnpm --dir docs-site build > docs-build.log 2>&1
          build_status=$?
          set -e
          printf '%s\n' "$validator_status" > docs-validator.status
          printf '%s\n' "$build_status" > docs-build.status
          cat docs-validator.log
          tail -n 120 docs-build.log

      - name: Upload documentation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: docs-pnpm-validation-log
          path: |
            docs-validator.log
            docs-validator.status
            docs-build.log
            docs-build.status
          if-no-files-found: error

      - name: Verify clean tracked state
        run: |
          git diff --check
          test -z "$(git status --short --untracked-files=no)"

      - name: Enforce documentation results
        run: |
          test "$(cat docs-validator.status)" -eq 0
          test "$(cat docs-build.status)" -eq 0
