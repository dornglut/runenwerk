[package]
name = "engine"
version = "0.1.0"
edition = "2024"

[dependencies]
wgpu = "27.0.1"

winit = "0.30.9"

glam = "0.30.9"
tokio = { version = "1.48.0", features = ["rt", "rt-multi-thread", "macros", "time"] }

anyhow = "1.0.100"
tracing = "0.1.43"
tracing-subscriber = { version = "0.3.22" , features = ["fmt", "env-filter"]}
pollster = "0.4.0"
bytemuck = "1.24.0"

scheduler = { path = "../scheduler" }
